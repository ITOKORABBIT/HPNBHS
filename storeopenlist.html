<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特約商店 - 和平里</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
img{display:block;max-width:100%}
button{cursor:pointer;font-family:inherit}

:root{
  --bg:        #EDF5FF;
  --card:      #FFFFFF;
  --border:    #B8D4EE;
  --divider:   #CCE2F5;
  --lbl:       #456280;
  --val:       #182C44;
  --muted:     #80AACB;
  --heading:   #0E2038;
  --primary:       #4A92C4;
  --primary-light: #E3F2FF;
  --primary-dark:  #3070A0;
  --shadow-sm: 0 1px 3px rgba(20,60,100,.07);
  --shadow-md: 0 2px 8px rgba(20,60,100,.09), 0 1px 2px rgba(20,60,100,.05);
  --radius: 10px;
  --font: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
}

body{
  font-family: var(--font);
  background: var(--bg);
  color: var(--val);
  font-size: 15px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Page header ── */
.page-header{
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 54px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
}
.header-title{
  flex: 1;
  font-size: 16px; font-weight: 700;
  color: var(--heading);
  text-align: center;
}
.header-subtitle{
  font-size: 12px; font-weight: 400;
  color: var(--lbl); margin-top: 1px;
}
.apply-btn{
  display: flex; align-items: center; gap: 5px;
  padding: 7px 13px;
  border-radius: 8px; border: none;
  background: #F2C843;
  font-size: 13px; font-weight: 600;
  color: #5A3E00; transition: background .15s; white-space: nowrap;
}
.apply-btn:hover{ background: #DEB030; }

/* ── Filter bar ── */
.filter-wrap{
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 54px; z-index: 90;
}
.filter-bar{
  padding: 8px 16px;
  display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap;
}
.search-wrap{
  flex: 1; min-width: 180px;
  position: relative;
  display: flex; align-items: center;
}
.search-wrap svg{
  position: absolute; left: 10px;
  color: var(--muted); pointer-events: none;
}
.search-input{
  width: 100%; padding: 7px 10px 7px 34px;
  border-radius: 7px; border: 1px solid var(--border);
  background: var(--bg); font-family: var(--font); font-size: 13px;
  color: var(--val); outline: none; transition: border-color .15s;
}
.search-input:focus{ border-color: var(--primary); }

/* ── Category chips ── */
.cate-chips{
  display: flex; gap: 6px; flex-wrap: wrap;
  padding: 0 16px 10px;
}
.cate-chip{
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 11px; border-radius: 999px;
  font-size: 12px; font-weight: 700;
  border: 1.5px solid transparent;
  cursor: pointer; transition: all .15s; white-space: nowrap;
  background: var(--bg); color: var(--lbl); border-color: var(--border);
}
.cate-chip.active{ border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); }

/* ── Result bar ── */
.result-bar{
  padding: 10px 16px 4px;
  font-size: 12px; color: var(--lbl);
}
.result-bar strong{ color: var(--primary); }

/* ── Card grid ── */
.card-grid{
  padding: 4px 12px 100px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

/* ── Store card ── */
.store-card{
  position: relative;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  display: flex; flex-direction: column;
  border-left: 3px solid var(--primary);
  transition: transform .15s, box-shadow .15s;
}
.store-card:hover{
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.card-thumb{
  width: 100%; aspect-ratio: 16/9;
  background: var(--divider);
  overflow: hidden; flex-shrink: 0;
}
.card-thumb img{
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .3s;
}
.store-card:hover .card-thumb img{ transform: scale(1.04); }
.card-thumb-placeholder{
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #DCEEFF 0%, #C8E2F8 100%);
}

.card-body{
  padding: 12px 14px 14px;
  flex: 1; display: flex; flex-direction: column;
}
.card-top{
  display: flex; align-items: center;
  gap: 6px; margin-bottom: 7px; flex-wrap: wrap;
}
.cate-badge{
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 5px;
  font-size: 11px; font-weight: 700;
}
.card-name{
  font-size: 15px; font-weight: 700;
  color: var(--heading); line-height: 1.4;
  margin-bottom: 5px;
}
.card-desc{
  font-size: 12px; color: var(--lbl);
  line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
  flex: 1;
}
.card-footer{
  margin-top: 10px; padding-top: 8px;
  border-top: 1px solid var(--divider);
  display: flex; align-items: center;
  gap: 10px; font-size: 11px; color: var(--muted);
  flex-wrap: wrap;
}
.card-footer span{
  display: flex; align-items: center; gap: 3px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px;
}
.card-offer{
  margin-top: 6px; padding: 5px 8px;
  background: var(--primary-light); border-radius: 6px;
  font-size: 11px; color: var(--primary-dark);
  display: -webkit-box; -webkit-line-clamp: 1;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* ── Plan tier cards：漸層邊框 + 舌型徽章（沿用深色稿美感，適配淺藍主題） ── */
/* 色票 */
:root{
  --gold-1:#C9922A; --gold-2:#F5D180; --gold-3:#E8B84B;
  --pink-1:#9B5A7A; --pink-2:#C47090; --pink-3:#E8A8C0;
}

/* 優選：金色漸層邊框 */
.store-card.plan-premium{
  border: 1.5px solid transparent;
  background-image:
    linear-gradient(var(--card), var(--card)),
    linear-gradient(135deg, var(--gold-1), var(--gold-2) 45%, var(--gold-3), var(--gold-1));
  background-origin: border-box;
  background-clip: padding-box, border-box;
  box-shadow: 0 2px 14px rgba(201,146,42,.22), var(--shadow-sm);
}
.store-card.plan-premium:hover{
  box-shadow: 0 4px 20px rgba(201,146,42,.32), var(--shadow-md);
}
.store-card.plan-premium .card-name{ color: #9E6A12; }

/* 精選：粉色漸層邊框 */
.store-card.plan-std{
  border: 1.5px solid transparent;
  background-image:
    linear-gradient(var(--card), var(--card)),
    linear-gradient(135deg, var(--pink-1), var(--pink-3) 50%, var(--pink-2), var(--pink-1));
  background-origin: border-box;
  background-clip: padding-box, border-box;
  box-shadow: 0 2px 12px rgba(155,90,122,.15), var(--shadow-sm);
}
.store-card.plan-std:hover{
  box-shadow: 0 4px 16px rgba(155,90,122,.22), var(--shadow-md);
}
.store-card.plan-std .card-name{ color: #8A4968; }

/* 舌型下垂徽章 */
.plan-tongue{
  position: absolute; top: -1px; right: 18px;
  padding: 5px 12px 9px;
  font-size: 10.5px; font-weight: 700; letter-spacing: .3px;
  color: var(--heading);
  z-index: 2;
  clip-path: polygon(0 0, 100% 0, 100% 78%, 50% 100%, 0 78%);
  pointer-events: none;
  white-space: nowrap;
}
.plan-tongue.premium{
  background: linear-gradient(135deg, var(--gold-2), var(--gold-3));
}
.plan-tongue.std{
  background: linear-gradient(135deg, var(--pink-3), var(--pink-2));
  color: #FFFFFF;
}

/* ── 區塊標題（優選推薦 / 其他商店） ── */
.section-header {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 2px 2px;
}
.section-header-label {
  font-size: 12px; font-weight: 700; color: var(--lbl);
  letter-spacing: .5px; text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
}
.section-header-line { flex: 1; height: 1px; background: var(--divider); }

/* ── Empty / Loading ── */
.state-wrap{
  grid-column: 1 / -1;
  text-align: center; padding: 60px 24px;
  color: var(--lbl);
}
.state-wrap svg{ margin: 0 auto 16px; opacity: .4; }
.state-wrap h3{ font-size: 16px; color: var(--heading); margin-bottom: 6px; }
.state-wrap p{ font-size: 13px; }

.skel{
  background: linear-gradient(90deg,var(--divider) 25%,#b4d0ea 50%,var(--divider) 75%);
  background-size: 300% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 5px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
}

@media(max-width: 480px){
  .card-grid{ grid-template-columns: 1fr; padding: 4px 10px 80px; }
}
</style>
</head>
<body>

<!-- ── Page header ── -->
<div class="page-header">
  <div style="width:60px"></div>
  <div class="header-title">
    <div>特約商店</div>
    <div class="header-subtitle" id="headerSubtitle">和平里特約商店系統</div>
  </div>
  <button class="apply-btn" onclick="window.location.href='store.html'">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    申請
  </button>
</div>

<!-- ── Filter bar ── -->
<div class="filter-wrap">
  <div class="filter-bar">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="搜尋商店名稱、優惠、地址…" oninput="applyFilters()">
    </div>
  </div>
  <div class="cate-chips" id="cateChips">
    <span class="cate-chip active" data-cate="all" onclick="selectCate(this)">全部類別</span>
  </div>
</div>

<!-- ── Result bar ── -->
<div class="result-bar" id="resultBar">載入中…</div>

<!-- ── Card grid ── -->
<div class="card-grid" id="cardGrid">
  <div class="skel-card" style="height:220px">
    <div class="skel" style="height:130px;border-radius:0"></div>
    <div style="padding:12px 14px">
      <div class="skel" style="height:12px;width:40%;margin-bottom:8px"></div>
      <div class="skel" style="height:15px;width:80%;margin-bottom:6px"></div>
      <div class="skel" style="height:12px;width:60%"></div>
    </div>
  </div>
  <div class="skel-card" style="height:220px">
    <div class="skel" style="height:130px;border-radius:0"></div>
    <div style="padding:12px 14px">
      <div class="skel" style="height:12px;width:50%;margin-bottom:8px"></div>
      <div class="skel" style="height:15px;width:75%;margin-bottom:6px"></div>
      <div class="skel" style="height:12px;width:65%"></div>
    </div>
  </div>
  <div class="skel-card" style="height:220px">
    <div class="skel" style="height:130px;border-radius:0"></div>
    <div style="padding:12px 14px">
      <div class="skel" style="height:12px;width:45%;margin-bottom:8px"></div>
      <div class="skel" style="height:15px;width:85%;margin-bottom:6px"></div>
      <div class="skel" style="height:12px;width:55%"></div>
    </div>
  </div>
</div>

<script src="storeconfig.js"></script>
<script>
var CATE_COLOR = {
  '食': { bg:'#FFF3E0', txt:'#B75D00' },
  '衣': { bg:'#F3EBFF', txt:'#6B28A8' },
  '住': { bg:'#EBF3FF', txt:'#1A56A8' },
  '行': { bg:'#E0F7FA', txt:'#006B6B' },
  '育': { bg:'#EAF3EB', txt:'#2F6836' },
  '樂': { bg:'#FEE2E2', txt:'#991B1B' },
  '其他': { bg:'#F0EEEC', txt:'#7A6E66' },
};

function esc(s){ if (!s && s !== 0) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function cateBadge(cat) {
  var c = CATE_COLOR[cat] || { bg:'#F0EEEC', txt:'#7A6E66' };
  return '<span class="cate-badge" style="background:' + c.bg + ';color:' + c.txt + '">' + esc(cat) + '</span>';
}

var allStores = [];
var currentCate = 'all';

function apiCall(action, extra) {
  var payload = Object.assign({ action: action }, extra || {});
  return fetch(CONFIG.SCRIPT_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.text(); })
  .then(function(t){ return JSON.parse(t); });
}

function loadStores() {
  apiCall('getPublicStores')
    .then(function(json){
      if (!json.success) { showError(json.error || '無法取得資料'); return; }
      allStores = json.stores || [];
      buildCateChips();
      applyFilters();
      document.getElementById('headerSubtitle').textContent =
        CONFIG.VILLAGE_NAME + '・' + CONFIG.SYSTEM_NAME;
    })
    .catch(function(){ showError('資料載入失敗，請稍後再試'); });
}

function buildCateChips() {
  var cats = {};
  allStores.forEach(function(d){ if (d.pubCate) cats[d.pubCate] = true; });
  var keys = Object.keys(cats).sort(function(a,b){
    var order = ['食','衣','住','行','育','樂','其他'];
    return order.indexOf(a) - order.indexOf(b);
  });
  var wrap = document.getElementById('cateChips');
  var html = '<span class="cate-chip active" data-cate="all" onclick="selectCate(this)">全部類別</span>';
  keys.forEach(function(c){
    var col = CATE_COLOR[c] || { bg:'#F0EEEC', txt:'#7A6E66' };
    html += '<span class="cate-chip" data-cate="' + esc(c) + '" onclick="selectCate(this)"' +
      ' style="--chip-bg:' + col.bg + ';--chip-txt:' + col.txt + '">' + esc(c) + '</span>';
  });
  wrap.innerHTML = html;
}

function selectCate(el) {
  currentCate = el.dataset.cate;
  document.querySelectorAll('.cate-chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  applyFilters();
}

function planWeight(d) {
  if ((d.planType === '優選') && d.pinOrder > 0) return 1;
  if (d.planType === '優選') return 2;
  if (d.planType === '精選') return 3;
  return 4;
}

function applyFilters() {
  var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  var filtered = allStores.filter(function(d){
    if (currentCate !== 'all' && (d.pubCate || '') !== currentCate) return false;
    if (q) {
      var hay = [d.pubName, d.pubCate, d.pubAddr, d.pubDesc, d.pubOffer].join(' ').toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });

  // 排序：優選置頂 > 優選 > 精選 > 免費，同級按 pinOrder asc
  filtered.sort(function(a, b) {
    var wa = planWeight(a), wb = planWeight(b);
    if (wa !== wb) return wa - wb;
    if (wa <= 2) return (a.pinOrder || 0) - (b.pinOrder || 0);
    return 0;
  });

  renderGrid(filtered);
  document.getElementById('resultBar').innerHTML =
    '共 <strong>' + filtered.length + '</strong> 家商店' +
    (allStores.length !== filtered.length ? '・全部 ' + allStores.length + ' 家' : '');
}

function sectionHeader(label) {
  return '<div class="section-header"><span class="section-header-label">' + label + '</span>' +
    '<div class="section-header-line"></div></div>';
}

function renderGrid(stores) {
  var grid = document.getElementById('cardGrid');
  if (!stores.length) {
    grid.innerHTML = '<div class="state-wrap">' +
      '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
      '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
      '<h3>沒有符合的商店</h3><p>請嘗試調整搜尋條件</p></div>';
    return;
  }

  var html = '';
  var lastGroup = null;
  stores.forEach(function(d) {
    var grp = (d.planType === '優選') ? 'premium' : (d.planType === '精選') ? 'std' : 'free';
    if (grp !== lastGroup) {
      if (grp === 'premium') html += sectionHeader('👑 優選推薦商家');
      else if (grp === 'std' && lastGroup === 'premium') html += sectionHeader('⭐ 精選商家');
      else if (grp === 'free' && (lastGroup === 'premium' || lastGroup === 'std')) html += sectionHeader('🏠 更多商家');
      lastGroup = grp;
    }
    html += renderCard(d);
  });
  grid.innerHTML = html;
}

function imgFallback(img) {
  img.parentNode.innerHTML = '<div class="card-thumb-placeholder">' +
    '<svg width="32" height="32" fill="none" stroke="#4A92C4" stroke-width="1.5" opacity=".5" viewBox="0 0 24 24">' +
    '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>';
}

function renderCard(d) {
  var thumb = d.photo1
    ? '<div class="card-thumb"><img src="' + esc(d.photo1) + '" alt="" loading="lazy" onerror="imgFallback(this)"></div>'
    : '<div class="card-thumb"><div class="card-thumb-placeholder">' +
      '<svg width="32" height="32" fill="none" stroke="#4A92C4" stroke-width="1.5" opacity=".5" viewBox="0 0 24 24">' +
      '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div></div>';

  var isPremium = d.planType === '優選';
  var isStd     = d.planType === '精選';
  var detailUrl = 'storeopendetail.html?id=' + encodeURIComponent(d.storeId);
  var cardCls = 'store-card' +
    (isPremium ? ' plan-premium' : '') +
    (isStd     ? ' plan-std'     : '');
  var html = '<div class="' + cardCls + '" onclick="location.href=\'' + detailUrl + '\'" style="cursor:pointer">';
  if (isPremium) html += '<div class="plan-tongue premium">優選</div>';
  else if (isStd) html += '<div class="plan-tongue std">精選</div>';
  html += thumb;
  html += '<div class="card-body">';
  html += '<div class="card-top">';
  if (d.pubCate) html += cateBadge(d.pubCate);
  html += '</div>';
  html += '<div class="card-name">' + esc(d.pubName || '（未命名）') + '</div>';
  if (d.pubPhone) {
    html += '<div style="font-size:12px;color:var(--lbl);margin:-3px 0 6px;display:flex;align-items:center;gap:4px">' +
      '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.25h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.85a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>' +
      '<a href="tel:' + esc(d.pubPhone) + '" onclick="event.stopPropagation()" style="color:var(--primary);text-decoration:none">' + esc(d.pubPhone) + '</a></div>';
  }
  if (d.pubDesc) html += '<div class="card-desc">' + esc(d.pubDesc) + '</div>';
  if (d.pubOffer) html += '<div class="card-offer">優惠：' + esc(d.pubOffer) + '</div>';
  if (d.pubAddr) {
    html += '<div class="card-footer">';
    html += '<span>' +
      '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
      esc(d.pubAddr.length > 18 ? d.pubAddr.slice(0,18)+'…' : d.pubAddr) +
      (d.pubMapUrl ? ' <a href="' + esc(d.pubMapUrl) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--primary);text-decoration:none">地圖</a>' : '') +
      '</span>';
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function showError(msg) {
  document.getElementById('cardGrid').innerHTML =
    '<div class="state-wrap">' +
    '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
    '<h3>載入失敗</h3><p>' + esc(msg) + '</p></div>';
  document.getElementById('resultBar').textContent = '載入失敗';
}

loadStores();
setInterval(function(){ loadStores(); }, 60000);
</script>
