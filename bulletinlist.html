<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公告管理 - 和平里小幫手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:#f5f1eb;
  color:#2b231b;
  min-height:100vh;
}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
a{text-decoration:none;color:inherit}

:root{
  --card:#fff;
  --border:#e4d9ce;
  --muted:#8d7968;
  --text:#2b231b;
  --heading:#18120d;
  --accent:#b95353;
  --accent-soft:#fff1ef;
  --green:#2f6836;
  --green-soft:#eaf3eb;
  --gold:#9b6112;
  --gold-soft:#fff4df;
  --gray:#6f645a;
  --gray-soft:#f2efea;
  --shadow:0 14px 40px rgba(43,35,27,.08);
  --radius:18px;
}

.login-shell{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px 16px;
}
.login-card{
  width:min(100%,420px);
  padding:30px 26px;
  border:1px solid var(--border);
  border-radius:24px;
  background:#fff;
  box-shadow:var(--shadow);
}
.login-badge{
  display:inline-flex;
  align-items:center;
  padding:8px 12px;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent);
  font-size:12px;
  font-weight:800;
  margin-bottom:16px;
}
.login-title{
  font-size:28px;
  font-weight:800;
  color:var(--heading);
  margin-bottom:10px;
}
.login-sub{
  color:var(--muted);
  line-height:1.7;
  margin-bottom:22px;
}
.login-error{
  display:none;
  margin-top:16px;
  padding:12px 14px;
  border-radius:12px;
  background:var(--accent-soft);
  color:var(--accent);
  font-size:14px;
}

.page{
  max-width:1280px;
  margin:0 auto;
  padding:24px 20px 40px;
}
.topbar{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  margin-bottom:18px;
}
.title-wrap h1{
  font-size:30px;
  font-weight:800;
  color:var(--heading);
  margin-bottom:8px;
}
.title-wrap p{color:var(--muted);line-height:1.7}
.top-actions{display:flex;flex-wrap:wrap;gap:10px}
.btn{
  padding:11px 14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  font-weight:700;
}
.btn.primary{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}

.layout{
  display:grid;
  grid-template-columns:1.2fr .9fr;
  gap:18px;
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.panel{
  padding:20px;
}
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:14px;
}
.search{
  flex:1;
  min-width:220px;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:12px;
}
.pill-group{display:flex;flex-wrap:wrap;gap:8px}
.pill{
  padding:9px 12px;
  border-radius:999px;
  border:1px solid var(--border);
  background:#fff;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}
.pill.active{
  background:var(--accent-soft);
  border-color:transparent;
  color:var(--accent);
}

.list-wrap{border:1px solid var(--border);border-radius:16px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th,td{
  padding:14px 16px;
  border-bottom:1px solid #f0e8de;
  text-align:left;
  vertical-align:top;
}
th{
  background:#fbf8f4;
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.05em;
}
tbody tr:hover{background:#fdf9f7}
tbody tr:last-child td{border-bottom:none}
.title-cell{font-weight:800;color:var(--heading)}
.preview{display:block;margin-top:6px;color:var(--muted);line-height:1.6}
.badge{
  display:inline-flex;
  align-items:center;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
}
.badge-published{background:var(--green-soft);color:var(--green)}
.badge-draft{background:var(--gold-soft);color:var(--gold)}
.badge-pinned{background:var(--gray-soft);color:var(--gray)}
.inline-actions{display:flex;flex-wrap:wrap;gap:8px}
.inline-btn{
  padding:8px 10px;
  border:none;
  border-radius:10px;
  background:#f6f0ea;
  font-size:13px;
  font-weight:700;
}

.editor-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  margin-bottom:18px;
}
.editor-title{font-size:24px;font-weight:800;color:var(--heading)}
.editor-sub{margin-top:6px;color:var(--muted);line-height:1.7}
.form-section{margin-bottom:16px}
.label{
  display:block;
  margin-bottom:6px;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}
.input,.textarea,.select{
  width:100%;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:12px;
  background:#fff;
}
.textarea{min-height:160px;resize:vertical;line-height:1.8}
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.toggle-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:12px;
  background:#fcf8f4;
}
.preview-box{
  margin-top:16px;
  padding:16px;
  border:1px dashed var(--border);
  border-radius:14px;
  background:#fffdfb;
}
.preview-box img{
  display:block;
  max-width:100%;
  max-height:220px;
  object-fit:cover;
  border-radius:12px;
  margin-top:12px;
}
.form-actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:20px;
}
.hint{
  padding:14px 16px;
  border-radius:14px;
  background:var(--accent-soft);
  color:var(--accent);
  font-size:14px;
  line-height:1.7;
  margin-bottom:16px;
}
.success{
  background:var(--green-soft);
  color:var(--green);
}
.empty{
  padding:44px 20px;
  text-align:center;
  color:var(--muted);
}
.empty h3{font-size:18px;color:var(--heading);margin-bottom:8px}

@media (max-width: 980px){
  .layout{grid-template-columns:1fr}
}
@media (max-width: 720px){
  .page{padding:18px 14px 30px}
  th:nth-child(4),td:nth-child(4){display:none}
  .grid-2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="login-shell" id="loginScreen">
  <div class="login-card">
    <div class="login-badge">活動公告欄</div>
    <div class="login-title">公告管理</div>
    <div class="login-sub">這裡是里長使用的公告發布頁。請使用已授權的 Google 帳號登入。</div>
    <div id="loginBtnWrap"></div>
    <div class="login-error" id="loginError">登入失敗，或此帳號尚未被加入管理名單。</div>
  </div>
</div>

<div class="page" id="appShell" style="display:none">
  <div class="topbar">
    <div class="title-wrap">
      <h1>公告管理</h1>
      <p>這裡負責新增、編輯、發布與刪除活動公告。前台 `bulletin.html` 只會顯示狀態為「已發布」的公告。</p>
    </div>
    <div class="top-actions">
      <a class="btn" href="admin.html?tab=bulletins">回管理後台</a>
      <a class="btn" href="bulletin.html" target="_blank" rel="noopener">查看里民前台</a>
      <button class="btn primary" onclick="createBulletin()">新增公告</button>
    </div>
  </div>

  <div class="layout">
    <section class="card panel">
      <div class="toolbar">
        <input class="search" id="searchInput" type="text" placeholder="搜尋標題、內容、建立者…" oninput="renderBulletins()">
        <div class="pill-group" id="statusPills"></div>
      </div>
      <div class="list-wrap" id="listWrap"></div>
    </section>

    <section class="card panel">
      <div class="editor-head">
        <div>
          <div class="editor-title" id="editorTitle">新增公告</div>
          <div class="editor-sub" id="editorSub">建立新公告後，可先存成草稿，再決定是否發布到里民前台。</div>
        </div>
      </div>

      <div class="hint" id="messageBox" style="display:none"></div>

      <div class="form-section">
        <label class="label" for="titleInput">公告標題</label>
        <input class="input" id="titleInput" type="text" placeholder="例如：五月里民清潔日通知">
      </div>

      <div class="grid-2">
        <div class="form-section">
          <label class="label" for="statusInput">狀態</label>
          <select class="select" id="statusInput">
            <option value="草稿">草稿</option>
            <option value="已發布">已發布</option>
          </select>
        </div>
        <div class="form-section">
          <label class="label" for="imageInput">圖片網址</label>
          <input class="input" id="imageInput" type="text" placeholder="https://...">
        </div>
      </div>

      <div class="form-section">
        <label class="label" for="contentInput">公告內容</label>
        <textarea class="textarea" id="contentInput" placeholder="請輸入公告內容，支援多行文字。"></textarea>
      </div>

      <label class="toggle-row">
        <input type="checkbox" id="pinnedInput">
        <span>設為置頂公告</span>
      </label>

      <div class="preview-box" id="previewBox">
        <strong>預覽摘要</strong>
        <div id="previewTitle" style="margin-top:10px;font-weight:800;color:var(--heading)">尚未輸入標題</div>
        <div id="previewMeta" style="margin-top:8px;color:var(--muted)">狀態：草稿</div>
        <div id="previewContent" style="margin-top:10px;color:var(--muted);line-height:1.8">尚未輸入內容</div>
        <img id="previewImage" alt="" style="display:none">
      </div>

      <div class="form-actions">
        <button class="btn primary" id="saveBtn" onclick="saveBulletin()">儲存公告</button>
        <button class="btn" onclick="resetEditor()">清空編輯器</button>
        <button class="btn" id="deleteBtn" onclick="removeBulletin()" style="display:none">刪除此公告</button>
      </div>
    </section>
  </div>
</div>

<script src="config.js"></script>
<script>
const SESSION_KEY = 'hpnbhs_admin';
const SESSION_TTL = 2 * 3600 * 1000;
let allBulletins = [];
let filterStatus = 'all';
let editingBulletinId = null;

function getSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data.sessionToken || Date.now() - data.ts > SESSION_TTL) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return data;
  } catch (error) {
    localStorage.removeItem(SESSION_KEY);
    return null;
  }
}

function apiCall(action, extra) {
  const sess = getSession();
  const payload = Object.assign({ action: action }, extra || {});
  if (sess) payload.sessionToken = sess.sessionToken;
  return fetch(CONFIG.SCRIPT_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(r => r.text())
  .then(t => JSON.parse(t));
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtDate(value) {
  if (!value) return '';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return String(value).slice(0, 16);
  return d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + String(d.getDate()).padStart(2, '0');
}

function showMessage(message, success) {
  const box = document.getElementById('messageBox');
  box.textContent = message;
  box.className = success ? 'hint success' : 'hint';
  box.style.display = 'block';
}

function hideMessage() {
  document.getElementById('messageBox').style.display = 'none';
}

function ensureLogin() {
  return !!getSession();
}

function clearSession() {
  localStorage.removeItem(SESSION_KEY);
}

function setSession(token, email, name, role) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({
    sessionToken: token,
    email: email,
    name: name,
    role: role,
    ts: Date.now()
  }));
}

function touchSession() {
  const sess = getSession();
  if (!sess) return;
  sess.ts = Date.now();
  localStorage.setItem(SESSION_KEY, JSON.stringify(sess));
}

function initGoogle() {
  if (ensureLogin()) {
    enterApp();
    return;
  }
  if (!CONFIG.GOOGLE_CLIENT_ID) return;
  if (typeof google === 'undefined') {
    setTimeout(initGoogle, 300);
    return;
  }
  google.accounts.id.initialize({
    client_id: CONFIG.GOOGLE_CLIENT_ID,
    callback: onGoogleSignIn,
    auto_select: true
  });
  google.accounts.id.renderButton(document.getElementById('loginBtnWrap'), {
    type: 'standard',
    theme: 'filled_blue',
    size: 'large',
    text: 'signin_with',
    locale: 'zh-TW',
    width: 280
  });
  google.accounts.id.prompt();
}

function onGoogleSignIn(resp) {
  document.getElementById('loginError').style.display = 'none';
  fetch(CONFIG.SCRIPT_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'login', id_token: resp.credential })
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(json => {
    if (!json.success) {
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    setSession(json.sessionToken, json.email, json.name, json.role || '');
    enterApp();
  })
  .catch(() => {
    document.getElementById('loginError').style.display = 'block';
  });
}

function enterApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  createBulletin();
  loadBulletins();
}

function createBulletin() {
  editingBulletinId = null;
  document.getElementById('editorTitle').textContent = '新增公告';
  document.getElementById('editorSub').textContent = '建立新公告後，可先存成草稿，再決定是否發布到里民前台。';
  document.getElementById('titleInput').value = '';
  document.getElementById('statusInput').value = '草稿';
  document.getElementById('imageInput').value = '';
  document.getElementById('contentInput').value = '';
  document.getElementById('pinnedInput').checked = false;
  document.getElementById('deleteBtn').style.display = 'none';
  hideMessage();
  refreshPreview();
}

function resetEditor() {
  createBulletin();
}

function fillEditor(item) {
  editingBulletinId = item.bulletinId;
  document.getElementById('editorTitle').textContent = '編輯公告';
  document.getElementById('editorSub').textContent = '目前正在編輯 ' + item.bulletinId + '，儲存後會立即同步到資料表。';
  document.getElementById('titleInput').value = item.title || '';
  document.getElementById('statusInput').value = item.status || '草稿';
  document.getElementById('imageInput').value = item.imageUrl || '';
  document.getElementById('contentInput').value = item.content || '';
  document.getElementById('pinnedInput').checked = !!item.pinned;
  document.getElementById('deleteBtn').style.display = 'inline-flex';
  hideMessage();
  refreshPreview();
}

function buildPills() {
  const counts = { all: allBulletins.length };
  allBulletins.forEach(item => {
    const key = item.status || '草稿';
    counts[key] = (counts[key] || 0) + 1;
  });
  const pills = [{ value: 'all', label: '全部 ' + counts.all }];
  Object.keys(counts).filter(k => k !== 'all').sort().forEach(k => {
    pills.push({ value: k, label: k + ' ' + counts[k] });
  });
  document.getElementById('statusPills').innerHTML = pills.map(item => (
    '<button class="pill' + (item.value === filterStatus ? ' active' : '') + '" onclick="setFilterStatus(\'' + escapeHtml(item.value) + '\')">' + escapeHtml(item.label) + '</button>'
  )).join('');
}

function setFilterStatus(value) {
  filterStatus = value;
  renderBulletins();
}

function renderBulletins() {
  buildPills();
  const q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const list = allBulletins.filter(item => {
    if (filterStatus !== 'all' && (item.status || '草稿') !== filterStatus) return false;
    if (!q) return true;
    const hay = [item.bulletinId, item.title, item.content, item.author].join(' ').toLowerCase();
    return hay.includes(q);
  });

  if (!list.length) {
    document.getElementById('listWrap').innerHTML = '<div class="empty"><h3>沒有符合的公告</h3><p>請切換狀態或調整搜尋條件。</p></div>';
    return;
  }

  const rows = list.map(item => (
    '<tr>' +
    '<td>' + escapeHtml(item.bulletinId) + '</td>' +
    '<td><div class="title-cell">' + escapeHtml(item.title || '（無標題）') + '</div><span class="preview">' + escapeHtml((item.content || '').slice(0, 60)) + '</span></td>' +
    '<td><span class="badge ' + (item.status === '已發布' ? 'badge-published' : 'badge-draft') + '">' + escapeHtml(item.status || '草稿') + '</span>' + (item.pinned ? ' <span class="badge badge-pinned">置頂</span>' : '') + '</td>' +
    '<td>' + escapeHtml(fmtDate(item.createdAt)) + '</td>' +
    '<td><div class="inline-actions"><button class="inline-btn" onclick="editBulletin(\'' + escapeHtml(item.bulletinId) + '\')">編輯</button><button class="inline-btn" onclick="quickToggleStatus(\'' + escapeHtml(item.bulletinId) + '\')">' + (item.status === '已發布' ? '改草稿' : '發布') + '</button></div></td>' +
    '</tr>'
  )).join('');

  document.getElementById('listWrap').innerHTML =
    '<table><thead><tr><th>公告編號</th><th>標題</th><th>狀態</th><th>建立時間</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function editBulletin(id) {
  const item = allBulletins.find(entry => entry.bulletinId === id);
  if (!item) return;
  fillEditor(item);
}

function quickToggleStatus(id) {
  const item = allBulletins.find(entry => entry.bulletinId === id);
  if (!item) return;
  apiCall('updateBulletin', {
    bulletinId: id,
    status: item.status === '已發布' ? '草稿' : '已發布'
  }).then(json => {
    if (json.code === 401) {
      clearSession();
      location.reload();
      return;
    }
    if (!json.success) {
      showMessage(json.error || '更新失敗', false);
      return;
    }
    loadBulletins();
    showMessage('公告狀態已更新。', true);
  }).catch(() => {
    showMessage('更新失敗，請稍後再試。', false);
  });
}

function loadBulletins() {
  apiCall('getBulletins').then(json => {
    if (json.code === 401) {
      clearSession();
      location.reload();
      return;
    }
    if (!json.success) throw new Error(json.error || '載入失敗');
    allBulletins = json.bulletins || [];
    renderBulletins();
  }).catch(error => {
    document.getElementById('listWrap').innerHTML = '<div class="empty"><h3>無法載入公告</h3><p>' + escapeHtml(error.message || '請稍後再試') + '</p></div>';
  });
}

function saveBulletin() {
  const title = document.getElementById('titleInput').value.trim();
  const content = document.getElementById('contentInput').value.trim();
  const imageUrl = document.getElementById('imageInput').value.trim();
  const status = document.getElementById('statusInput').value;
  const pinned = document.getElementById('pinnedInput').checked;

  if (!title) {
    showMessage('請輸入公告標題。', false);
    return;
  }

  const action = editingBulletinId ? 'updateBulletin' : 'addBulletin';
  const payload = {
    title: title,
    content: content,
    imageUrl: imageUrl,
    status: status,
    pinned: pinned
  };
  if (editingBulletinId) payload.bulletinId = editingBulletinId;

  document.getElementById('saveBtn').textContent = '儲存中…';
  apiCall(action, payload).then(json => {
    document.getElementById('saveBtn').textContent = '儲存公告';
    if (json.code === 401) {
      clearSession();
      location.reload();
      return;
    }
    if (!json.success) {
      showMessage(json.error || '儲存失敗', false);
      return;
    }
    showMessage(editingBulletinId ? '公告已更新。' : '公告已新增。', true);
    if (!editingBulletinId && json.bulletinId) editingBulletinId = json.bulletinId;
    loadBulletins();
  }).catch(() => {
    document.getElementById('saveBtn').textContent = '儲存公告';
    showMessage('儲存失敗，請稍後再試。', false);
  });
}

function removeBulletin() {
  if (!editingBulletinId) return;
  if (!confirm('確定要刪除這則公告？')) return;
  apiCall('deleteBulletin', { bulletinId: editingBulletinId }).then(json => {
    if (json.code === 401) {
      clearSession();
      location.reload();
      return;
    }
    if (!json.success) {
      showMessage(json.error || '刪除失敗', false);
      return;
    }
    showMessage('公告已刪除。', true);
    createBulletin();
    loadBulletins();
  }).catch(() => {
    showMessage('刪除失敗，請稍後再試。', false);
  });
}

function refreshPreview() {
  const title = document.getElementById('titleInput').value.trim();
  const content = document.getElementById('contentInput').value.trim();
  const image = document.getElementById('imageInput').value.trim();
  const status = document.getElementById('statusInput').value;
  const pinned = document.getElementById('pinnedInput').checked;
  document.getElementById('previewTitle').textContent = title || '尚未輸入標題';
  document.getElementById('previewMeta').textContent = '狀態：' + status + (pinned ? ' ・ 置頂' : '');
  document.getElementById('previewContent').textContent = content || '尚未輸入內容';
  const img = document.getElementById('previewImage');
  if (image) {
    img.src = image;
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
    img.src = '';
  }
}

['titleInput', 'contentInput', 'imageInput', 'statusInput', 'pinnedInput'].forEach(id => {
  document.addEventListener('input', event => {
    if (event.target && event.target.id === id) refreshPreview();
  });
  document.addEventListener('change', event => {
    if (event.target && event.target.id === id) refreshPreview();
  });
});

window.addEventListener('load', function() {
  let tries = 0;
  const timer = setInterval(function() {
    if (typeof google !== 'undefined' || ++tries > 30) {
      clearInterval(timer);
      if (ensureLogin()) {
        enterApp();
      } else {
        initGoogle();
      }
    }
  }, 200);
});
['click','keydown','mousedown','touchstart','scroll'].forEach(function(eventName) {
  window.addEventListener(eventName, function() {
    touchSession();
  }, { passive: true });
});
</script>
