<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特約商店管理後台 - 和平里</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
img{display:block;max-width:100%}
button{cursor:pointer;font-family:inherit}

:root{
  --bg:        #F5F2EE;
  --card:      #FFFFFF;
  --border:    #E2D9CF;
  --divider:   #EDE7DF;
  --lbl:       #8C7B6A;
  --val:       #2C2018;
  --muted:     #B8A898;
  --heading:   #1E160E;
  --primary:       #C49A3C;
  --primary-light: #FDF6E3;
  --primary-dark:  #A07C28;
  --warn:      #C0582A;
  --warn-bg:   #FDF0EA;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10);
  --radius: 10px;
  --font: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  --topbar-h: 56px;
}

body{
  font-family: var(--font);
  background: var(--bg);
  color: var(--val);
  font-size: 14px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Login Screen ── */
#loginScreen{
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 500; padding: 40px;
}
.login-logo{
  width: 72px; height: 72px;
  background: var(--primary);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px;
  box-shadow: 0 6px 20px rgba(196,154,60,.35);
}
.login-title{ font-size: 22px; font-weight: 700; color: var(--heading); margin-bottom: 6px; }
.login-sub{
  font-size: 14px; color: var(--lbl);
  margin-bottom: 32px; text-align: center; line-height: 1.6;
}
#loginBtnWrap{ display: flex; justify-content: center; }
.login-error{
  margin-top: 16px; font-size: 13px; color: var(--warn);
  background: var(--warn-bg); padding: 10px 18px; border-radius: 8px; display: none;
}

/* ── Top bar ── */
#appShell{ display: none; }
.topbar{
  height: var(--topbar-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow-sm);
}
.topbar-brand{ display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; color: var(--heading); }
.topbar-brand-icon{
  width: 30px; height: 30px; background: var(--primary);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
}
.topbar-divider{ width: 1px; height: 20px; background: var(--border); }
.topbar-sub{ font-size: 13px; color: var(--lbl); font-weight: 400; }
.topbar-spacer{ flex: 1; }
.topbar-user{ display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--lbl); }
.topbar-avatar{
  width: 30px; height: 30px; background: var(--primary-light);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--primary);
}
.logout-btn{
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; font-size: 12px; color: var(--lbl); transition: background .15s;
}
.logout-btn:hover{ background: var(--bg); }

/* ── Content area ── */
.content{ padding: 20px 24px 60px; }

/* ── Summary chips ── */
.summary-row{ display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.summary-chip{
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: var(--card);
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; color: var(--lbl); cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.summary-chip:hover{ background: var(--divider); }
.summary-chip.active{ border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
.summary-chip .chip-num{ font-size: 16px; font-weight: 700; color: var(--heading); }
.summary-chip.active .chip-num{ color: var(--primary); }
.chip-dot{ width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Toolbar ── */
.toolbar{ display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.search-wrap{
  flex: 1; min-width: 220px; max-width: 360px;
  position: relative; display: flex; align-items: center;
}
.search-wrap svg{ position: absolute; left: 10px; color: var(--muted); pointer-events: none; flex-shrink: 0; }
.search-input{
  width: 100%; padding: 7px 10px 7px 34px;
  border-radius: 7px; border: 1px solid var(--border);
  background: var(--card); font-family: var(--font); font-size: 13px;
  color: var(--val); outline: none; transition: border-color .15s;
}
.search-input:focus{ border-color: var(--primary); }
.toolbar-right{ display: flex; gap: 8px; align-items: center; margin-left: auto; }
.result-count{ font-size: 12px; color: var(--muted); }

/* ── Table wrapper ── */
.table-wrap{
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden;
}
.data-table{ width: 100%; border-collapse: collapse; }
.data-table thead th{
  padding: 10px 14px; text-align: left;
  font-size: 11px; font-weight: 700; color: var(--lbl);
  letter-spacing: .6px; text-transform: uppercase;
  background: var(--bg); border-bottom: 1px solid var(--border);
  white-space: nowrap; cursor: pointer; user-select: none; transition: background .1s;
}
.data-table thead th:hover{ background: var(--divider); }
.data-table thead th.sorted{ color: var(--primary); }
.sort-icon{ opacity: .4; margin-left: 4px; }
.data-table thead th.sorted .sort-icon{ opacity: 1; }
.data-table tbody tr{ border-bottom: 1px solid var(--divider); transition: background .1s; cursor: pointer; }
.data-table tbody tr:last-child{ border-bottom: none; }
.data-table tbody tr:hover > td{ background: #FAFAF8; }
.data-table tbody tr.expanded > td{ background: var(--primary-light); }
.data-table tbody tr.expanded > td:first-child{ border-left: 3px solid var(--primary); }
.data-table td{ padding: 11px 14px; font-size: 13px; color: var(--val); vertical-align: middle; }
td.col-id{ font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .4px; white-space: nowrap; }
td.col-name{ font-weight: 600; color: var(--heading); max-width: 200px; }
td.col-name span{ display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 200px; }
td.col-cate, td.col-date, td.col-applicant{ white-space: nowrap; color: var(--lbl); }
td.col-addr span{ display: block; max-width: 160px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; color: var(--lbl); }
td.col-status{ white-space: nowrap; }
td.col-expand{ width: 32px; text-align: center; color: var(--muted); }
.expand-icon{ transition: transform .2s; }
tr.expanded .expand-icon{ transform: rotate(180deg); }

/* ── Badge ── */
.badge{ display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
.badge-pending { background: #FFF3E0; color: #B75D00; }
.badge-public  { background: #EAF3EB; color: #2F6836; }
.badge-reject  { background: #F0EEEC; color: #7A6E66; }

/* ── Category badge ── */
.cate-badge{
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 5px;
  font-size: 11px; font-weight: 700;
}

/* ── Expand panel ── */
.expand-row td{ padding: 0 !important; background: #FAFAFA !important; cursor: default; }
.expand-panel{
  padding: 20px 24px;
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 20px; border-top: 1px solid var(--divider);
}
.expand-section-title{
  font-size: 11px; font-weight: 700; color: var(--lbl);
  letter-spacing: .5px; text-transform: uppercase; margin-bottom: 10px;
}
.expand-field{ margin-bottom: 8px; }
.expand-field-lbl{ font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.expand-field-val{ font-size: 13px; color: var(--val); line-height: 1.5; word-break: break-word; }
.expand-field-val.empty{ color: var(--muted); font-style: italic; }
.expand-photos{ display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.expand-photos img{
  width: 80px; height: 60px; object-fit: cover; border-radius: 6px;
  border: 1px solid var(--border); cursor: pointer; transition: transform .15s;
}
.expand-photos img:hover{ transform: scale(1.05); }
.expand-actions{
  grid-column: 1 / -1; display: flex; align-items: center;
  gap: 10px; padding-top: 12px; border-top: 1px solid var(--divider);
}
.btn{
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600;
  border: none; transition: all .15s; text-decoration: none;
}
.btn-primary{ background: var(--primary); color: #fff; box-shadow: 0 2px 6px rgba(196,154,60,.25); }
.btn-primary:hover{ background: var(--primary-dark); }
.btn-secondary{ background: var(--bg); color: var(--lbl); border: 1px solid var(--border); }
.btn-secondary:hover{ background: var(--divider); }

/* ── Empty state ── */
.empty-row td{ padding: 60px 24px !important; text-align: center; color: var(--lbl); cursor: default; }
.empty-row td svg{ display: block; margin: 0 auto 12px; opacity: .35; }

/* ── Skeleton ── */
.skel{
  background: linear-gradient(90deg,var(--divider) 25%,#ece6de 50%,var(--divider) 75%);
  background-size: 300% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Lightbox ── */
.lightbox{ position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 600; display: none; align-items: center; justify-content: center; }
.lightbox.open{ display: flex; }
.lightbox img{ max-width: 92vw; max-height: 88vh; border-radius: 10px; }
.lb-close{
  position: absolute; top: 18px; right: 18px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: none;
  color: #fff; font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.lb-close:hover{ background: rgba(255,255,255,.3); }
</style>
</head>
<body>

<!-- ── Lightbox ── -->
<div class="lightbox" id="lightbox" onclick="closeLb()">
  <button class="lb-close" onclick="closeLb()">&#215;</button>
  <img id="lbImg" src="" alt="">
</div>

<!-- ── Login Screen ── -->
<div id="loginScreen">
  <div class="login-logo">
    <svg width="32" height="32" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </div>
  <div class="login-title">特約商店管理後台</div>
  <div class="login-sub">北屯區和平里・特約商店系統<br>請以管理員 Google 帳號登入</div>
  <div id="loginBtnWrap"></div>
  <div class="login-error" id="loginError">此帳號沒有管理員權限，請聯絡系統管理員。</div>
</div>

<!-- ── App Shell ── -->
<div id="appShell">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">
        <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      和平里特約商店
    </div>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">管理後台</span>
    <div class="topbar-spacer"></div>
    <div class="topbar-user">
      <div class="topbar-avatar" id="topbarAvatar">?</div>
      <span id="topbarName">載入中</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>

  <div class="content">
    <!-- Summary chips -->
    <div class="summary-row" id="summaryRow">
      <div class="summary-chip active" data-filter="all" onclick="setFilter('all', this)">
        <span class="chip-num" id="cnt-all">–</span>
        <span>全部商店</span>
      </div>
      <div class="summary-chip" data-filter="申請審核中" onclick="setFilter('申請審核中', this)">
        <span class="chip-dot" style="background:#B75D00"></span>
        <span class="chip-num" id="cnt-pending">–</span>
        <span>申請審核中</span>
      </div>
      <div class="summary-chip" data-filter="已公開" onclick="setFilter('已公開', this)">
        <span class="chip-dot" style="background:#2F6836"></span>
        <span class="chip-num" id="cnt-public">–</span>
        <span>已公開</span>
      </div>
      <div class="summary-chip" data-filter="不通過" onclick="setFilter('不通過', this)">
        <span class="chip-dot" style="background:#7A6E66"></span>
        <span class="chip-num" id="cnt-reject">–</span>
        <span>不通過</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="search-input" id="searchInput"
          placeholder="搜尋商店ID、店家名稱、地址、申請人…" oninput="renderTable()">
      </div>
      <div class="toolbar-right">
        <span class="result-count" id="resultCount"></span>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="data-table" id="dataTable">
        <thead>
          <tr>
            <th onclick="sortBy('storeId')"   id="th-storeId">商店ID<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('applyTime')" id="th-applyTime">申請日期<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('status')"    id="th-status">狀態<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('category')"  id="th-category">類別<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('storeName')" id="th-storeName">店家名稱<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('addr')"      id="th-addr">地址<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('name')"      id="th-name">申請人<span class="sort-icon">↕</span></th>
            <th style="width:32px;cursor:default"></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" style="padding:0">
            <div style="padding:14px 14px;display:flex;flex-direction:column;gap:10px">
              <div class="skel" style="height:16px;width:100%"></div>
              <div class="skel" style="height:16px;width:90%"></div>
              <div class="skel" style="height:16px;width:95%"></div>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="storeconfig.js"></script>
<script>
var adminName  = '';
var gEmail     = '';
var allStores  = [];
var sortCol    = 'applyTime';
var sortAsc    = false;
var expandedId = null;

// ── SESSION ──
var SESSION_KEY = 'tokuten_admin';
var SESSION_TTL = 6 * 3600 * 1000;
function setSession(token, email, name) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ sessionToken: token, email: email, name: name, ts: Date.now() }));
}
function clearSession() { localStorage.removeItem(SESSION_KEY); }
function getSession() {
  try {
    var d = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if (!d || !d.sessionToken || Date.now() - d.ts > SESSION_TTL) { clearSession(); return null; }
    return d;
  } catch(e) { return null; }
}

// ── API ──
function apiCall(action, extra) {
  var sess = getSession();
  var payload = Object.assign({ action: action }, extra || {});
  if (sess) payload.sessionToken = sess.sessionToken;
  return fetch(CONFIG.SCRIPT_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.text(); })
  .then(function(t){ return JSON.parse(t); })
  .then(function(json){
    if (json.code === 401) { clearSession(); location.reload(); }
    return json;
  });
}

// ── AUTH ──
function initGoogle() {
  var sess = getSession();
  if (sess) { adminName = sess.name || ''; gEmail = sess.email || ''; enterApp(); return; }
  if (!CONFIG.GOOGLE_CLIENT_ID) return;
  if (typeof google === 'undefined') { setTimeout(initGoogle, 300); return; }
  google.accounts.id.initialize({ client_id: CONFIG.GOOGLE_CLIENT_ID, callback: onGoogleSignIn, auto_select: true });
  google.accounts.id.renderButton(
    document.getElementById('loginBtnWrap'),
    { type: 'standard', theme: 'filled_blue', size: 'large', text: 'signin_with', locale: 'zh-TW', width: 280 }
  );
  google.accounts.id.prompt();
}

function onGoogleSignIn(resp) {
  document.getElementById('loginError').style.display = 'none';
  fetch(CONFIG.SCRIPT_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'login', id_token: resp.credential })
  })
  .then(function(r){ return r.text(); })
  .then(function(t){ return JSON.parse(t); })
  .then(function(json){
    if (!json.success) { var el = document.getElementById('loginError'); el.style.display = 'block'; el.textContent = json.error || '此帳號沒有管理員權限，請聯絡系統管理員。'; return; }
    adminName = json.name || ''; gEmail = json.email || '';
    setSession(json.sessionToken, json.email, json.name);
    enterApp();
  })
  .catch(function(err){ var el = document.getElementById('loginError'); el.style.display = 'block'; el.textContent = 'fetch錯誤: ' + err; });
}

function enterApp() {
  var redirect = new URLSearchParams(location.search).get('redirect') || '';
  if (redirect) {
    try {
      var url = new URL(redirect, location.origin);
      if (url.origin === location.origin) { location.href = redirect; return; }
    } catch(e) {}
  }
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  document.getElementById('topbarAvatar').textContent = adminName ? adminName.charAt(0) : '?';
  document.getElementById('topbarName').textContent = adminName;
  loadStores();
  setInterval(function(){ if (getSession()) loadStores(); }, 60000);
}

function doLogout() {
  clearSession();
  if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
  location.reload();
}

window.addEventListener('load', function(){
  var tries = 0;
  var t = setInterval(function(){
    if (typeof google !== 'undefined' || ++tries > 30){ clearInterval(t); initGoogle(); }
  }, 200);
});

// ── DATA ──
function loadStores() {
  apiCall('getStores')
    .then(function(json){
      if (!json.success) throw new Error(json.error || '載入失敗');
      allStores = json.stores || [];
      buildSummaryCounts();
      renderTable();
    })
    .catch(function(){
      document.getElementById('tableBody').innerHTML =
        '<tr class="empty-row"><td colspan="8">' +
        '<svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
        '載入失敗，請重新整理</td></tr>';
    });
}

// ── HELPERS ──
function esc(s){ if (!s && s !== 0) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function v(s){ return (s && String(s).trim()) ? esc(s) : '<span style="color:var(--muted)">—</span>'; }

var CATE_COLOR = {
  '食': { bg:'#FFF3E0', txt:'#B75D00' },
  '衣': { bg:'#F3EBFF', txt:'#6B28A8' },
  '住': { bg:'#EBF3FF', txt:'#1A56A8' },
  '行': { bg:'#E0F7FA', txt:'#006B6B' },
  '育': { bg:'#EAF3EB', txt:'#2F6836' },
  '樂': { bg:'#FEE2E2', txt:'#991B1B' },
  '其他': { bg:'#F0EEEC', txt:'#7A6E66' },
};
function cateBadge(cat) {
  var c = CATE_COLOR[cat] || { bg:'#F0EEEC', txt:'#7A6E66' };
  return '<span class="cate-badge" style="background:' + c.bg + ';color:' + c.txt + '">' + esc(cat) + '</span>';
}

function badgeCls(s) {
  if (!s) return 'badge-pending';
  if (s === '已公開') return 'badge-public';
  if (s === '不通過') return 'badge-reject';
  return 'badge-pending';
}

function parseDate(ts){ if (!ts) return null; var d = new Date(ts); return isNaN(d.getTime()) ? null : d; }
function fmtDate(ts){ var d = parseDate(ts); if (!d) return '—'; return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function statusWeight(s){ if (!s) return 9; if (s==='申請審核中') return 1; if (s==='已公開') return 2; if (s==='不通過') return 3; return 9; }
function storeIdNum(id){ if (!id) return 0; var m = String(id).match(/(\d+)/); return m ? parseInt(m[1], 10) : 0; }

function buildSummaryCounts(){
  var cnt = { all: allStores.length, pending: 0, public: 0, reject: 0 };
  allStores.forEach(function(d){
    if (d.status === '申請審核中') cnt.pending++;
    else if (d.status === '已公開')  cnt.public++;
    else if (d.status === '不通過')  cnt.reject++;
  });
  document.getElementById('cnt-all').textContent     = cnt.all;
  document.getElementById('cnt-pending').textContent = cnt.pending;
  document.getElementById('cnt-public').textContent  = cnt.public;
  document.getElementById('cnt-reject').textContent  = cnt.reject;
}

// ── FILTER & SORT ──
var _currentFilter = 'all';
function setFilter(f, el){
  _currentFilter = f; expandedId = null;
  document.querySelectorAll('.summary-chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  renderTable();
}
function sortBy(col){
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  document.querySelectorAll('thead th').forEach(function(th){ th.classList.remove('sorted'); });
  var th = document.getElementById('th-' + col);
  if (th){ th.classList.add('sorted'); th.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓'; }
  renderTable();
}

// ── RENDER TABLE ──
function renderTable(){
  var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  var f = _currentFilter;
  var list = allStores.filter(function(d){
    if (f !== 'all' && d.status !== f) return false;
    if (q){
      var hay = [d.storeId, d.storeName, d.addr, d.category, d.name, d.phone, d.desc, d.offer].join(' ').toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  list.sort(function(a, b){
    var av, bv;
    if (sortCol === 'applyTime'){
      av = parseDate(a.applyTime) ? parseDate(a.applyTime).getTime() : 0;
      bv = parseDate(b.applyTime) ? parseDate(b.applyTime).getTime() : 0;
    } else if (sortCol === 'status'){
      av = statusWeight(a.status); bv = statusWeight(b.status);
    } else if (sortCol === 'storeId'){
      av = storeIdNum(a.storeId); bv = storeIdNum(b.storeId);
    } else {
      av = String(a[sortCol] || '').toLowerCase();
      bv = String(b[sortCol] || '').toLowerCase();
    }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ?  1 : -1;
    return 0;
  });

  document.getElementById('resultCount').textContent =
    '共 ' + list.length + ' 筆' + (f !== 'all' || q ? '（篩選中）' : '');

  var tbody = document.getElementById('tableBody');
  if (!list.length){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">' +
      '<svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
      '沒有符合的商店</td></tr>';
    return;
  }

  var html = '';
  list.forEach(function(d){
    var isExp = expandedId === d.storeId;
    html += '<tr class="case-row' + (isExp ? ' expanded' : '') + '" onclick="toggleExpand(\'' + esc(d.storeId) + '\')">';
    html += '<td class="col-id">' + esc(d.storeId) + '</td>';
    html += '<td class="col-date">' + fmtDate(d.applyTime) + '</td>';
    html += '<td class="col-status"><span class="badge ' + badgeCls(d.status) + '">' + esc(d.status || '—') + '</span></td>';
    html += '<td class="col-cate">' + (d.category ? cateBadge(d.category) : '—') + '</td>';
    html += '<td class="col-name"><span>' + esc(d.storeName || '（無名稱）') + '</span></td>';
    html += '<td class="col-addr"><span>' + esc(d.addr || '—') + '</span></td>';
    html += '<td class="col-applicant">' + esc(d.name || '—') + '</td>';
    html += '<td class="col-expand"><svg class="expand-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></td>';
    html += '</tr>';
    if (isExp){
      html += '<tr class="expand-row"><td colspan="8">';
      html += buildExpandPanel(d);
      html += '</td></tr>';
    }
  });
  tbody.innerHTML = html;
}

function buildExpandPanel(d){
  var photos = [d.photo1, d.photo2, d.photo3].filter(Boolean);
  var html = '<div class="expand-panel">';

  // Col 1: 商家資訊
  html += '<div>';
  html += '<div class="expand-section-title">商家資訊</div>';
  html += ef('類別', d.category ? cateBadge(d.category) : '—', true);
  html += ef('店家電話', d.storePhone);
  html += ef('統一編號', d.storeNum);
  html += ef('店家地址', d.addr);
  html += ef('經營內容', d.desc);
  html += ef('優惠方案', d.offer);
  html += ef('營業時間', d.hours);
  if (d.mapUrl) html += '<div class="expand-field"><div class="expand-field-lbl">地圖</div><div class="expand-field-val"><a href="' + esc(d.mapUrl) + '" target="_blank" rel="noopener" style="color:var(--primary)">開啟地圖 ↗</a></div></div>';
  if (photos.length){
    html += '<div class="expand-field"><div class="expand-field-lbl">店家照片</div><div class="expand-photos">';
    photos.forEach(function(p){ html += '<img src="' + esc(p) + '" onclick="event.stopPropagation();openLb(\'' + esc(p) + '\')">'; });
    html += '</div></div>';
  }
  html += '</div>';

  // Col 2: 申請人資訊
  html += '<div>';
  html += '<div class="expand-section-title">申請人資訊</div>';
  html += ef('姓名', d.name);
  html += ef('電話', d.phone);
  if (d.lineId) html += ef('LINE ID', d.lineId);
  html += '</div>';

  // Col 3: 審核資訊
  html += '<div>';
  html += '<div class="expand-section-title">審核資訊</div>';
  html += ef('狀態', '<span class="badge ' + badgeCls(d.status) + '">' + esc(d.status) + '</span>', true);
  if (d.note) html += ef('管理員備註', d.note);
  if (d.lastUpdate) html += ef('最後更新', fmtDate(d.lastUpdate));
  html += '</div>';

  // Actions
  html += '<div class="expand-actions">';
  html += '<a class="btn btn-primary" href="storedetail.html?id=' + encodeURIComponent(d.storeId) + '" onclick="event.stopPropagation()">';
  html += '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  html += '審核商店</a>';
  html += '<span style="font-size:12px;color:var(--muted)">商店ID：' + esc(d.storeId) + '</span>';
  html += '</div>';

  html += '</div>';
  return html;
}

function ef(lbl, val, raw){
  var display = (val && String(val).trim())
    ? '<div class="expand-field-val">' + (raw ? val : esc(val)) + '</div>'
    : '<div class="expand-field-val empty">—</div>';
  return '<div class="expand-field"><div class="expand-field-lbl">' + lbl + '</div>' + display + '</div>';
}

function toggleExpand(id){ expandedId = (expandedId === id) ? null : id; renderTable(); }
function openLb(url){ document.getElementById('lbImg').src = url; document.getElementById('lightbox').classList.add('open'); }
function closeLb(){ document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeLb(); });
</script>
</body>
</html>
