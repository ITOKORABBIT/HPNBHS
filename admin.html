<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理後台 - 和平里通報系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
img{display:block;max-width:100%}
button{cursor:pointer;font-family:inherit}

:root{
  --bg:#F5F2EE; --card:#FFF; --border:#E2D9CF; --divider:#EDE7DF;
  --lbl:#8C7B6A; --val:#2C2018; --muted:#B8A898; --heading:#1E160E;
  --warn:#C0582A; --warn-bg:#FDF0EA;
  --shadow-sm:0 1px 3px rgba(0,0,0,.07);
  --radius:10px;
  --font:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;
  --topbar-h:56px;
  /* Tab accent — overridden per tab */
  --accent:#4B7A52; --accent-l:#EAF3EB; --accent-d:#3A5E3F;
  /* Badge colours */
  --badge-new-bg:#EBF3FF;  --badge-new-txt:#1A56A8;
  --badge-proc-bg:#FFF3E0; --badge-proc-txt:#B75D00;
  --badge-fwd-bg:#F3EBFF;  --badge-fwd-txt:#6B28A8;
  --badge-done-bg:#EAF3EB; --badge-done-txt:#2F6836;
  --badge-grey-bg:#F0EEEC; --badge-grey-txt:#7A6E66;
}

body{font-family:var(--font);background:var(--bg);color:var(--val);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Login ── */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;padding:40px}
.login-logo{width:72px;height:72px;background:#4B7A52;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 6px 20px rgba(75,122,82,.35)}
.login-title{font-size:22px;font-weight:700;color:var(--heading);margin-bottom:6px}
.login-sub{font-size:14px;color:var(--lbl);margin-bottom:32px;text-align:center;line-height:1.6}
#loginBtnWrap{display:flex;justify-content:center}
.login-error{margin-top:16px;font-size:13px;color:var(--warn);background:var(--warn-bg);padding:10px 18px;border-radius:8px;display:none}

/* ── App shell ── */
#appShell{display:none}

/* ── Topbar ── */
.topbar{height:var(--topbar-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.topbar-brand{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:var(--heading)}
.topbar-brand-icon{width:30px;height:30px;background:#4B7A52;border-radius:8px;display:flex;align-items:center;justify-content:center}
.topbar-divider{width:1px;height:20px;background:var(--border)}
.topbar-sub{font-size:13px;color:var(--lbl);font-weight:400}
.topbar-spacer{flex:1}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--lbl)}
.topbar-avatar{width:30px;height:30px;background:var(--accent-l);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent)}
.logout-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--lbl);transition:background .15s}
.logout-btn:hover{background:var(--bg)}

/* ── Tab bar ── */
.tabbar{background:var(--card);border-bottom:1px solid var(--border);display:flex;padding:0 24px;gap:0;position:sticky;top:var(--topbar-h);z-index:99}
.tabbar-item{padding:11px 18px;font-size:13.5px;font-weight:600;color:var(--lbl);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:7px;white-space:nowrap;user-select:none}
.tabbar-item:hover{color:var(--heading);background:var(--bg)}
.tabbar-item.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-badge{background:var(--badge-proc-bg);color:var(--badge-proc-txt);padding:1px 7px;border-radius:10px;font-size:11px;font-weight:700}
.tabbar-item.active .tab-badge{background:var(--accent-l);color:var(--accent)}

/* ── Content ── */
.content{padding:20px 24px 60px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Summary chips ── */
.summary-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.summary-chip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--lbl);cursor:pointer;transition:all .15s;white-space:nowrap}
.summary-chip:hover{background:var(--divider)}
.summary-chip.active{border-color:var(--accent);background:var(--accent-l);color:var(--accent)}
.summary-chip .chip-num{font-size:16px;font-weight:700;color:var(--heading)}
.summary-chip.active .chip-num{color:var(--accent)}
.chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:220px;max-width:360px;position:relative;display:flex;align-items:center}
.search-wrap svg{position:absolute;left:10px;color:var(--muted);pointer-events:none;flex-shrink:0}
.search-input{width:100%;padding:7px 10px 7px 34px;border-radius:7px;border:1px solid var(--border);background:var(--card);font-family:var(--font);font-size:13px;color:var(--val);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--accent)}
.toolbar-right{display:flex;gap:8px;align-items:center;margin-left:auto}
.result-count{font-size:12px;color:var(--muted)}

/* ── Table ── */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.data-table{width:100%;border-collapse:collapse}
.data-table thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--lbl);letter-spacing:.6px;text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:background .1s}
.data-table thead th:hover{background:var(--divider)}
.data-table thead th.sorted{color:var(--accent)}
.sort-icon{opacity:.4;margin-left:4px}
.data-table thead th.sorted .sort-icon{opacity:1}
.data-table tbody tr{border-bottom:1px solid var(--divider);transition:background .1s;cursor:pointer}
.data-table tbody tr:last-child{border-bottom:none}
.data-table tbody tr:hover>td{background:#FAFAF8}
.data-table tbody tr.expanded>td{background:var(--accent-l)}
.data-table tbody tr.expanded>td:first-child{border-left:3px solid var(--accent)}
.data-table td{padding:11px 14px;font-size:13px;color:var(--val);vertical-align:middle}
td.col-id{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.4px;white-space:nowrap}
td.col-title,td.col-name{font-weight:600;color:var(--heading);max-width:260px}
td.col-title span,td.col-name span{display:block;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:260px}
td.col-cate,td.col-date,td.col-handler,td.col-applicant{white-space:nowrap;color:var(--lbl)}
td.col-addr span{display:block;max-width:160px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--lbl)}
td.col-status{white-space:nowrap}
td.col-expand{width:32px;text-align:center;color:var(--muted)}
.expand-icon{transition:transform .2s}
tr.expanded .expand-icon{transform:rotate(180deg)}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700}
.badge-new  {background:var(--badge-new-bg); color:var(--badge-new-txt)}
.badge-proc {background:var(--badge-proc-bg);color:var(--badge-proc-txt)}
.badge-fwd  {background:var(--badge-fwd-bg); color:var(--badge-fwd-txt)}
.badge-done {background:var(--badge-done-bg);color:var(--badge-done-txt)}
.badge-grey {background:var(--badge-grey-bg);color:var(--badge-grey-txt)}
.badge-stor-pending{background:#FFF3E0;color:#B75D00}
.badge-stor-public {background:#EAF3EB;color:#2F6836}
.badge-stor-reject {background:#F0EEEC;color:#7A6E66}
.badge-plan-premium{background:#FEF3C7;color:#B45309;border:1px solid #FCD34D}
.badge-plan-std    {background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.badge-plan-free   {background:#F0EEEC;color:#7A6E66}
/* 置頂控制 */
.pin-ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.pin-order-input{width:64px;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);color:var(--val);outline:none;transition:border-color .15s}
.pin-order-input:focus{border-color:var(--accent)}
.pin-save-btn{padding:5px 12px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.pin-save-btn:hover{background:var(--accent-d)}
.cate-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700}

/* ── Expand panel ── */
.expand-row td{padding:0!important;background:#FAFAFA!important;cursor:default}
.expand-panel{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;border-top:1px solid var(--divider)}
.expand-section-title{font-size:11px;font-weight:700;color:var(--lbl);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.expand-field{margin-bottom:8px}
.expand-field-lbl{font-size:11px;color:var(--muted);margin-bottom:2px}
.expand-field-val{font-size:13px;color:var(--val);line-height:1.5;word-break:break-word}
.expand-field-val.empty{color:var(--muted);font-style:italic}
.expand-photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.expand-photos img{width:80px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:transform .15s}
.expand-photos img:hover{transform:scale(1.05)}
.expand-actions{grid-column:1/-1;display:flex;align-items:center;gap:10px;padding-top:12px;border-top:1px solid var(--divider)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;border:none;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.btn-primary:hover{background:var(--accent-d)}
.btn-secondary{background:var(--bg);color:var(--lbl);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--divider)}

/* ── Empty ── */
.empty-row td{padding:60px 24px!important;text-align:center;color:var(--lbl);cursor:default}
.empty-row td svg{display:block;margin:0 auto 12px;opacity:.35}

/* ── Skeleton ── */
.skel{background:linear-gradient(90deg,var(--divider) 25%,#ece6de 50%,var(--divider) 75%);background-size:300% 100%;animation:shimmer 1.4s infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;display:none;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:10px}
.lb-close{position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center}
.lb-close:hover{background:rgba(255,255,255,.3)}

/* ── Accounts tab ── */
.acc-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.acc-toolbar-title{font-size:15px;font-weight:700;color:var(--heading)}
.acc-toolbar-sub{font-size:12px;color:var(--muted);margin-top:2px}
.acc-add-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;background:var(--accent);color:#fff;border:none;cursor:pointer;transition:background .15s}
.acc-add-btn:hover{background:var(--accent-d)}
.acc-table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.acc-table{width:100%;border-collapse:collapse}
.acc-table thead th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--lbl);letter-spacing:.6px;text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
.acc-table tbody tr{border-bottom:1px solid var(--divider);transition:background .1s}
.acc-table tbody tr:last-child{border-bottom:none}
.acc-table tbody tr:hover td{background:#FAFAF8}
.acc-table td{padding:12px 16px;font-size:13px;vertical-align:middle}
.acc-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.acc-avatar.active-av{background:var(--accent-l);color:var(--accent)}
.acc-avatar.inactive-av{background:var(--badge-grey-bg);color:var(--badge-grey-txt)}
.acc-name-cell{display:flex;align-items:center;gap:10px}
.acc-name{font-size:13px;font-weight:700;color:var(--heading)}
.acc-email{font-size:12px;color:var(--muted);margin-top:1px}
.acc-role-badge{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:700}
.acc-role-badge.active-rb{background:var(--accent-l);color:var(--accent)}
.acc-role-badge.inactive-rb{background:var(--badge-grey-bg);color:var(--badge-grey-txt)}
/* Toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{position:relative;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:11px;transition:background .2s;cursor:pointer}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}
.toggle-label{font-size:12px;color:var(--muted)}
/* Action buttons */
.acc-actions{display:flex;gap:6px}
.icon-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--lbl);cursor:pointer;transition:all .15s}
.icon-btn:hover{background:var(--bg);border-color:var(--accent);color:var(--accent)}
.icon-btn.danger:hover{border-color:var(--warn);color:var(--warn)}
/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:700;display:none;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.open{display:flex}
.modal{background:var(--card);border-radius:14px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--divider);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700;color:var(--heading)}
.modal-close{width:28px;height:28px;border:none;background:var(--bg);border-radius:6px;color:var(--lbl);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.modal-close:hover{background:var(--divider)}
.modal-body{padding:20px 22px}
.modal-field{margin-bottom:16px}
.modal-label{font-size:12.5px;font-weight:600;color:var(--lbl);margin-bottom:5px;display:block}
.modal-input,.modal-select{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;font-family:var(--font);color:var(--val);outline:none;transition:border-color .15s;background:#fff}
.modal-input:focus,.modal-select:focus{border-color:var(--accent)}
.modal-footer{padding:14px 22px;border-top:1px solid var(--divider);display:flex;justify-content:flex-end;gap:10px}
.modal-btn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.modal-btn-cancel{background:var(--bg);color:var(--lbl);border:1px solid var(--border)}
.modal-btn-cancel:hover{background:var(--divider)}
.modal-btn-save{background:var(--accent);color:#fff}
.modal-btn-save:hover{background:var(--accent-d)}
.modal-btn-save:disabled{opacity:.5;cursor:default}
.modal-err{font-size:12px;color:var(--warn);background:var(--warn-bg);padding:8px 12px;border-radius:6px;margin-bottom:12px;display:none}
/* Confirm dialog */
.confirm-modal{max-width:360px}
.confirm-msg{font-size:14px;color:var(--val);line-height:1.6;margin-bottom:4px}
.confirm-sub{font-size:12px;color:var(--muted)}
.modal-btn-danger{background:#dc2626;color:#fff}
.modal-btn-danger:hover{background:#b91c1c}
</style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="closeLb()">
  <button class="lb-close" onclick="closeLb()">&#215;</button>
  <img id="lbImg" src="" alt="">
</div>

<!-- Login -->
<div id="loginScreen">
  <div class="login-logo">
    <svg width="32" height="32" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </div>
  <div class="login-title">管理後台</div>
  <div class="login-sub">北屯區和平里<br>請以管理員 Google 帳號登入</div>
  <div id="loginBtnWrap"></div>
  <div class="login-error" id="loginError">此帳號沒有管理員權限，請聯絡系統管理員。</div>
</div>

<!-- App Shell -->
<div id="appShell">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">
        <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      和平里通報系統
    </div>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">管理後台</span>
    <div class="topbar-spacer"></div>
    <div class="topbar-user">
      <div class="topbar-avatar" id="topbarAvatar">?</div>
      <span id="topbarName">載入中</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>

  <!-- Tab bar -->
  <div class="tabbar">
    <div class="tabbar-item active" id="tab-nbh" onclick="switchTab('nbh')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      里民通報清單
      <span class="tab-badge" id="nbh-tab-badge">–</span>
    </div>
    <div class="tabbar-item" id="tab-stor" onclick="switchTab('stor')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      特約商店清單
      <span class="tab-badge" id="stor-tab-badge">–</span>
    </div>
    <div class="tabbar-item" id="tab-acc" onclick="switchTab('acc')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
      里長帳號管理
    </div>
  </div>

  <div class="content">

    <!-- ══ Tab: 里民通報 ══ -->
    <div class="tab-panel active" id="panel-nbh">
      <div class="summary-row" id="nbh-summary">
        <div class="summary-chip active" onclick="nbhSetFilter('all',this)"><span class="chip-num" id="nbh-cnt-all">–</span><span>全部案件</span></div>
        <div class="summary-chip" onclick="nbhSetFilter('新案件',this)"><span class="chip-dot" style="background:var(--badge-new-txt)"></span><span class="chip-num" id="nbh-cnt-new">–</span><span>新案件</span></div>

            <th onclick="nbhSort('status')"    id="th-status">狀態<span class="sort-icon">↕</span></th>

              <div class="skel" style="height:16px;width:100%"></div>

        <div class="summary-chip" onclick="storSetFilter('申請審核中',this)"><span class="chip-dot" style="background:#B75D00"></span><span class="chip-num" id="stor-cnt-pending">–</span><span>申請審核中</span></div>
        <div class="summary-chip" onclick="storSetFilter('已公開',this)"><span class="chip-dot" style="background:#2F6836"></span><span class="chip-num" id="stor-cnt-public">–</span><span>已公開</span></div>
        <div class="summary-chip" onclick="storSetFilter('不通過',this)"><span class="chip-dot" style="background:#7A6E66"></span><span class="chip-num" id="stor-cnt-reject">–</span><span>不通過</span></div>
      </div>
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="stor-search" placeholder="搜尋商店ID、店家名稱、地址、申請人…" oninput="storRender()">
        </div>
        <div class="toolbar-right"><span class="result-count" id="stor-count"></span></div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>
            <th onclick="storSort('storeId')"   id="sth-storeId">商店ID<span class="sort-icon">↕</span></th>
            <th onclick="storSort('applyTime')" id="sth-applyTime">申請日期<span class="sort-icon">↕</span></th>
            <th onclick="storSort('status')"    id="sth-status">狀態<span class="sort-icon">↕</span></th>
            <th onclick="storSort('category')"  id="sth-category">類別<span class="sort-icon">↕</span></th>
            <th onclick="storSort('storeName')" id="sth-storeName">店家名稱<span class="sort-icon">↕</span></th>
            <th onclick="storSort('addr')"      id="sth-addr">地址<span class="sort-icon">↕</span></th>
            <th onclick="storSort('name')"      id="sth-name">申請人<span class="sort-icon">↕</span></th>
            <th style="width:32px;cursor:default"></th>
          </tr></thead>
          <tbody id="stor-tbody">
            <tr><td colspan="8" style="padding:0"><div style="padding:14px;display:flex;flex-direction:column;gap:10px">
              <div class="skel" style="height:16px;width:100%"></div>
              <div class="skel" style="height:16px;width:90%"></div>
              <div class="skel" style="height:16px;width:95%"></div>
            </div></td></tr>

    <!-- ══ Tab: 帳號管理 ══ -->

        </div>

          新增帳號

                <div class="skel" style="height:48px;border-radius:8px"></div>
                <div class="skel" style="height:48px;border-radius:8px"></div>

    <!-- ── Add/Edit Modal ── -->

            <input class="modal-input" id="acc-f-name" type="text" placeholder="例：王大明">
          </div>
          <div class="modal-field">
            <label class="modal-label" for="acc-f-email">電子郵件 <span style="color:var(--warn)">*</span></label>
            <input class="modal-input" id="acc-f-email" type="email" placeholder="example@gmail.com">
          </div>
          <div class="modal-field">
            <label class="modal-label" for="acc-f-role">角色</label>
            <select class="modal-select" id="acc-f-role">

        <div class="modal-footer">

          <button class="modal-btn modal-btn-save" id="acc-modal-save" onclick="accSaveModal()">儲存</button>

    <!-- ── Confirm Delete Modal ── -->
    <div class="modal-backdrop" id="acc-confirm-backdrop" onclick="accCloseConfirm(event)">
      <div class="modal confirm-modal" role="dialog" aria-modal="true">
        <div class="modal-header">
          <div class="modal-title">確認刪除</div>
          <button class="modal-close" onclick="accCloseConfirm()">&#215;</button>
        </div>
        <div class="modal-body">
          <div class="confirm-msg" id="acc-confirm-msg">確定要刪除此帳號嗎？</div>
          <div class="confirm-sub">此操作無法復原。</div>
        </div>
        <div class="modal-footer">
          <button class="modal-btn modal-btn-cancel" onclick="accCloseConfirm()">取消</button>
          <button class="modal-btn modal-btn-danger" id="acc-confirm-ok" onclick="accDeleteConfirmed()">刪除</button>
        </div>
      </div>
    </div>

  </div><!-- /.content -->
</div><!-- /#appShell -->

<script src="config.js"></script>
<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
var adminName = '', gEmail = '';
var allCases  = [], allStores = [], allAdmins = [];
var storLoaded = false, accLoaded = false;

// NBH
var nbhSortCol = 'reportTime', nbhSortAsc = false;
var nbhFilter = 'all', nbhExpandedId = null;
// STOR
var storSortCol = 'applyTime', storSortAsc = false;
var storFilter = 'all', storExpandedId = null;

var SESSION_KEY = 'hpnbhs_admin';
var SESSION_TTL = 6 * 3600 * 1000;

// Tab accent palette
var TAB_ACCENT = {
  nbh:  { a:'#4B7A52', al:'#EAF3EB', ad:'#3A5E3F' },
  stor: { a:'#C49A3C', al:'#FDF6E3', ad:'#A07C28' },
  acc:  { a:'#2563EB', al:'#EFF6FF', ad:'#1D4ED8' },
};

// ══════════════════════════════════════════════
// SESSION
// ══════════════════════════════════════════════
function setSession(token, email, name) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ sessionToken: token, email, name, ts: Date.now() }));
}
function clearSession() { localStorage.removeItem(SESSION_KEY); }
function getSession() {
  try {
    var d = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if (!d || !d.sessionToken || Date.now() - d.ts > SESSION_TTL) { clearSession(); return null; }
    return d;
  } catch(e) { return null; }
}

// ══════════════════════════════════════════════
// API
// ══════════════════════════════════════════════
function apiCall(action, extra) {
  var sess = getSession();
  var payload = Object.assign({ action }, extra || {});
  if (sess) payload.sessionToken = sess.sessionToken;
  return fetch(CONFIG.SCRIPT_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(r => r.text())
  .then(t => JSON.parse(t))
  .then(json => {
    if (json.code === 401) { clearSession(); location.reload(); }
    return json;
  });
}

// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
function initGoogle() {
  var sess = getSession();
  if (sess) { adminName = sess.name || ''; gEmail = sess.email || ''; enterApp(); return; }
  if (!CONFIG.GOOGLE_CLIENT_ID) return;
  if (typeof google === 'undefined') { setTimeout(initGoogle, 300); return; }
  google.accounts.id.initialize({ client_id: CONFIG.GOOGLE_CLIENT_ID, callback: onGoogleSignIn, auto_select: true });
  google.accounts.id.renderButton(document.getElementById('loginBtnWrap'),
    { type: 'standard', theme: 'filled_blue', size: 'large', text: 'signin_with', locale: 'zh-TW', width: 280 });
  google.accounts.id.prompt();
}

function onGoogleSignIn(resp) {
  document.getElementById('loginError').style.display = 'none';
  fetch(CONFIG.SCRIPT_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'login', id_token: resp.credential })
  })
  .then(r => r.text()).then(t => JSON.parse(t))
  .then(json => {
    if (!json.success) { document.getElementById('loginError').style.display = 'block'; return; }
    adminName = json.name || ''; gEmail = json.email || '';
    setSession(json.sessionToken, json.email, json.name);
    enterApp();
  })
  .catch(() => { document.getElementById('loginError').style.display = 'block'; });
}

function enterApp() {
  var redirect = new URLSearchParams(location.search).get('redirect') || '';
  if (redirect) {
    try { var u = new URL(redirect, location.origin); if (u.origin === location.origin) { location.href = redirect; return; } } catch(e) {}
  }
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  document.getElementById('topbarAvatar').textContent = adminName ? adminName.charAt(0) : '?';
  document.getElementById('topbarName').textContent = adminName;
  loadCases();
  setInterval(() => { if (getSession()) { loadCases(); if (storLoaded) loadStores(); } }, 60000);
}

function doLogout() {
  clearSession();
  if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
  location.reload();
}

window.addEventListener('load', function(){
  var tries = 0;
  var t = setInterval(function(){
    if (typeof google !== 'undefined' || ++tries > 30) { clearInterval(t); initGoogle(); }
  }, 200);
});

// ══════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════
var currentTab = 'nbh';

function switchTab(tab) {
  if (currentTab === tab) return;
  currentTab = tab;

  // Update tab bar active state
  document.querySelectorAll('.tabbar-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  // Show/hide panels
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');

  // Update CSS accent colour
  var c = TAB_ACCENT[tab];
  document.documentElement.style.setProperty('--accent',   c.a);
  document.documentElement.style.setProperty('--accent-l', c.al);
  document.documentElement.style.setProperty('--accent-d', c.ad);

  // Lazy load
  if (tab === 'stor' && !storLoaded) { storLoaded = true; loadStores(); }
  if (tab === 'acc'  && !accLoaded)  { accLoaded  = true; loadAdmins(); }
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function esc(s) {
  if (!s && s !== 0) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(ts) {
  if (!ts) return '—';
  var d = new Date(ts);
  if (isNaN(d.getTime())) return String(ts).substring(0, 10) || '—';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseDate(ts) { if (!ts) return null; var d = new Date(ts); return isNaN(d.getTime()) ? null : d; }

function openLb(url) { document.getElementById('lbImg').src = url; document.getElementById('lightbox').classList.add('open'); }
function closeLb()   { document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

function expandField(lbl, val) {
  var display = (val && String(val).trim())
    ? '<div class="expand-field-val">' + esc(val) + '</div>'
    : '<div class="expand-field-val empty">—</div>';
  return '<div class="expand-field"><div class="expand-field-lbl">' + lbl + '</div>' + display + '</div>';
}
function expandFieldRaw(lbl, html) {
  return '<div class="expand-field"><div class="expand-field-lbl">' + lbl + '</div><div class="expand-field-val">' + (html || '<span style="color:var(--muted)">—</span>') + '</div></div>';
}

var CATE_COLOR = {
  '食':{'bg':'#FFF3E0','txt':'#B75D00'}, '衣':{'bg':'#F3EBFF','txt':'#6B28A8'},
  '住':{'bg':'#EBF3FF','txt':'#1A56A8'}, '行':{'bg':'#E0F7FA','txt':'#006B6B'},
  '育':{'bg':'#EAF3EB','txt':'#2F6836'}, '樂':{'bg':'#FEE2E2','txt':'#991B1B'},
  '其他':{'bg':'#F0EEEC','txt':'#7A6E66'},
};
function cateBadge(cat) {
  var c = CATE_COLOR[cat] || {'bg':'#F0EEEC','txt':'#7A6E66'};
  return '<span class="cate-badge" style="background:' + c.bg + ';color:' + c.txt + '">' + esc(cat) + '</span>';
}

// ══════════════════════════════════════════════
// ── NBH 里民通報 ──
// ══════════════════════════════════════════════
function loadCases() {
  apiCall('getCases').then(json => {
    if (!json.success) throw new Error(json.error);
    allCases = json.cases || [];
    nbhBuildCounts();
    nbhRender();
    document.getElementById('nbh-tab-badge').textContent = allCases.length;
  }).catch(() => {
    document.getElementById('nbh-tbody').innerHTML = errRow(8);
  });
}

function nbhBuildCounts() {
  var c = { all: allCases.length, new:0, proc:0, fwd:0, done:0 };
  allCases.forEach(d => {
    var s = d.status || '';
    if (s.includes('新案件')) c.new++;
    else if (s.includes('處理中')) c.proc++;
    else if (s.includes('轉交'))  c.fwd++;
    else if (s.includes('結案'))  c.done++;
  });
  document.getElementById('nbh-cnt-all').textContent  = c.all;
  document.getElementById('nbh-cnt-new').textContent  = c.new;
  document.getElementById('nbh-cnt-proc').textContent = c.proc;
  document.getElementById('nbh-cnt-fwd').textContent  = c.fwd;
  document.getElementById('nbh-cnt-done').textContent = c.done;
}

function nbhSetFilter(f, el) {
  nbhFilter = f; nbhExpandedId = null;
  document.querySelectorAll('#nbh-summary .summary-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  nbhRender();
}

function nbhSort(col) {
  if (nbhSortCol === col) nbhSortAsc = !nbhSortAsc;
  else { nbhSortCol = col; nbhSortAsc = true; }
  document.querySelectorAll('#panel-nbh thead th').forEach(th => { th.classList.remove('sorted'); th.querySelector('.sort-icon').textContent = '↕'; });
  var th = document.getElementById('th-' + col);
  if (th) { th.classList.add('sorted'); th.querySelector('.sort-icon').textContent = nbhSortAsc ? '↑' : '↓'; }
  nbhRender();
}

function nbhStatusWeight(s) {
  if (!s) return 9;
  if (s.includes('新案件')) return 1; if (s.includes('處理中')) return 2;
  if (s.includes('轉交'))   return 3; if (s.includes('結案'))   return 4;
  if (s.includes('不受理')) return 5; return 9;
}
function nbhBadgeCls(s) {
  if (!s) return 'badge-proc';
  if (s.includes('新案件')) return 'badge-new';  if (s.includes('處理中')) return 'badge-proc';
  if (s.includes('轉交'))   return 'badge-fwd';  if (s.includes('結案'))   return 'badge-done';
  if (s.includes('不受理')) return 'badge-grey'; return 'badge-proc';
}

function nbhRender() {
  var q = (document.getElementById('nbh-search').value || '').trim().toLowerCase();
  var list = allCases.filter(d => {
    if (nbhFilter !== 'all' && !(d.status || '').includes(nbhFilter)) return false;
    if (q) { var h = [d.caseId,d.title,d.addr,d.category,d.name,d.phone,d.handler,d.desc,d.replyContent].join(' ').toLowerCase(); if (!h.includes(q)) return false; }
    return true;
  });

  list.sort((a, b) => {
    var av, bv;
    if (nbhSortCol === 'reportTime' || nbhSortCol === 'replyTime') {
      av = parseDate(a[nbhSortCol])?.getTime() || 0; bv = parseDate(b[nbhSortCol])?.getTime() || 0;
    } else if (nbhSortCol === 'status') {
      av = nbhStatusWeight(a.status); bv = nbhStatusWeight(b.status);
    } else if (nbhSortCol === 'caseId') {
      av = parseInt((String(a.caseId).match(/\d+/)||['0'])[0]); bv = parseInt((String(b.caseId).match(/\d+/)||['0'])[0]);
    } else { av = String(a[nbhSortCol]||'').toLowerCase(); bv = String(b[nbhSortCol]||'').toLowerCase(); }
    return av < bv ? (nbhSortAsc ? -1 : 1) : av > bv ? (nbhSortAsc ? 1 : -1) : 0;
  });

  document.getElementById('nbh-count').textContent = '共 ' + list.length + ' 筆' + (nbhFilter !== 'all' || q ? '（篩選中）' : '');

  if (!list.length) { document.getElementById('nbh-tbody').innerHTML = emptyRow(8, '沒有符合的案件'); return; }

  var html = '';
  list.forEach(d => {
    var isExp = nbhExpandedId === d.caseId;
    html += '<tr class="case-row' + (isExp ? ' expanded' : '') + '" onclick="nbhToggle(\'' + esc(d.caseId) + '\')">';
    html += '<td class="col-id">' + esc(d.caseId) + '</td>';
    html += '<td class="col-date">' + fmtDate(d.reportTime) + '</td>';
    html += '<td class="col-status"><span class="badge ' + nbhBadgeCls(d.status) + '">' + esc(d.status||'—') + '</span></td>';
    html += '<td class="col-cate">' + esc(d.category||'—') + '</td>';
    html += '<td class="col-title"><span>' + esc(d.title||'（無標題）') + '</span></td>';
    html += '<td class="col-addr"><span>' + esc(d.addr||'—') + '</span></td>';
    html += '<td class="col-handler">' + esc(d.handler||'—') + '</td>';
    html += '<td class="col-expand"><svg class="expand-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></td>';
    html += '</tr>';
    if (isExp) {
      html += '<tr class="expand-row"><td colspan="8">' + nbhBuildPanel(d) + '</td></tr>';
    }
  });
  document.getElementById('nbh-tbody').innerHTML = html;
}

function nbhToggle(id) { nbhExpandedId = (nbhExpandedId === id) ? null : id; nbhRender(); }

// ══════════════════════════════════════════════
// ── STOR 特約商店 ──
// ══════════════════════════════════════════════
function loadStores() {
  apiCall('getStores').then(json => {
    if (!json.success) throw new Error(json.error);
    allStores = json.stores || [];
    storBuildCounts();
    storRender();
    document.getElementById('stor-tab-badge').textContent = allStores.length;
  }).catch(() => {
    document.getElementById('stor-tbody').innerHTML = errRow(8);
  });
}

function storBuildCounts() {
  var c = { all: allStores.length, pending:0, public:0, reject:0 };
  allStores.forEach(d => {
    if (d.status === '申請審核中') c.pending++;
    else if (d.status === '已公開')  c.public++;
    else if (d.status === '不通過')  c.reject++;
  });
  document.getElementById('stor-cnt-all').textContent     = c.all;
  document.getElementById('stor-cnt-pending').textContent = c.pending;
  document.getElementById('stor-cnt-public').textContent  = c.public;
  document.getElementById('stor-cnt-reject').textContent  = c.reject;
}

function storSetFilter(f, el) {
  storFilter = f; storExpandedId = null;
  document.querySelectorAll('#stor-summary .summary-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  storRender();
}

function storSort(col) {
  if (storSortCol === col) storSortAsc = !storSortAsc;
  else { storSortCol = col; storSortAsc = true; }
  document.querySelectorAll('#panel-stor thead th').forEach(th => { th.classList.remove('sorted'); th.querySelector('.sort-icon').textContent = '↕'; });
  var th = document.getElementById('sth-' + col);
  if (th) { th.classList.add('sorted'); th.querySelector('.sort-icon').textContent = storSortAsc ? '↑' : '↓'; }
  storRender();
}

function storStatusWeight(s) { if (s==='申請審核中') return 1; if (s==='已公開') return 2; if (s==='不通過') return 3; return 9; }
function storBadgeCls(s) { if (s==='已公開') return 'badge-stor-public'; if (s==='不通過') return 'badge-stor-reject'; return 'badge-stor-pending'; }

function storRender() {
  var q = (document.getElementById('stor-search').value || '').trim().toLowerCase();
  var list = allStores.filter(d => {
    if (storFilter !== 'all' && d.status !== storFilter) return false;
    if (q) { var h = [d.storeId,d.storeName,d.addr,d.category,d.name,d.phone,d.desc,d.offer].join(' ').toLowerCase(); if (!h.includes(q)) return false; }
    return true;
  });

  list.sort((a, b) => {
    var av, bv;
    if (storSortCol === 'applyTime') {
      av = parseDate(a.applyTime)?.getTime() || 0; bv = parseDate(b.applyTime)?.getTime() || 0;
    } else if (storSortCol === 'status') {
      av = storStatusWeight(a.status); bv = storStatusWeight(b.status);
    } else if (storSortCol === 'storeId') {
      av = parseInt((String(a.storeId).match(/\d+/)||['0'])[0]); bv = parseInt((String(b.storeId).match(/\d+/)||['0'])[0]);
    } else { av = String(a[storSortCol]||'').toLowerCase(); bv = String(b[storSortCol]||'').toLowerCase(); }
    return av < bv ? (storSortAsc ? -1 : 1) : av > bv ? (storSortAsc ? 1 : -1) : 0;
  });

  document.getElementById('stor-count').textContent = '共 ' + list.length + ' 筆' + (storFilter !== 'all' || q ? '（篩選中）' : '');

  if (!list.length) { document.getElementById('stor-tbody').innerHTML = emptyRow(8, '沒有符合的商店'); return; }

  var html = '';
  list.forEach(d => {
    var isExp = storExpandedId === d.storeId;
    html += '<tr class="case-row' + (isExp ? ' expanded' : '') + '" onclick="storToggle(\'' + esc(d.storeId) + '\')">';
    html += '<td class="col-id">' + esc(d.storeId) + '</td>';
    html += '<td class="col-date">' + fmtDate(d.applyTime) + '</td>';
    html += '<td class="col-status"><span class="badge ' + storBadgeCls(d.status) + '">' + esc(d.status||'—') + '</span></td>';
    html += '<td class="col-cate">' + (d.category ? cateBadge(d.category) : '—') + '</td>';
    html += '<td class="col-name"><span>' + esc(d.storeName||'（無名稱）') + '</span></td>';
    html += '<td class="col-addr"><span>' + esc(d.addr||'—') + '</span></td>';
    html += '<td class="col-applicant">' + esc(d.name||'—') + '</td>';
    html += '<td class="col-expand"><svg class="expand-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></td>';
    html += '</tr>';
    if (isExp) html += '<tr class="expand-row"><td colspan="8">' + storBuildPanel(d) + '</td></tr>';
  });
  document.getElementById('stor-tbody').innerHTML = html;
}

function storBuildPanel(d) {
  var photos = [d.photo1, d.photo2, d.photo3].filter(Boolean);
  var html = '<div class="expand-panel">';
  html += '<div><div class="expand-section-title">商家資訊</div>';
  html += expandFieldRaw('類別', d.category ? cateBadge(d.category) : '');
  html += expandField('店家電話', d.storePhone); html += expandField('統一編號', d.storeNum);
  html += expandField('店家地址', d.addr);       html += expandField('經營內容', d.desc);
  html += expandField('優惠方案', d.offer);      html += expandField('營業時間', d.hours);
  if (d.mapUrl) html += expandFieldRaw('地圖', '<a href="' + esc(d.mapUrl) + '" target="_blank" rel="noopener" style="color:var(--accent)">開啟地圖 ↗</a>');
  if (photos.length) {
    html += '<div class="expand-field"><div class="expand-field-lbl">店家照片</div><div class="expand-photos">';
    photos.forEach(p => { html += '<img src="' + esc(p) + '" onclick="event.stopPropagation();openLb(\'' + esc(p) + '\')">'; });
    html += '</div></div>';
  }
  html += '</div>';
  html += '<div><div class="expand-section-title">申請人資訊</div>';
  html += expandField('姓名', d.name); html += expandField('電話', d.phone);
  if (d.lineId) html += expandField('LINE ID', d.lineId);
  html += '</div>';
  html += '<div><div class="expand-section-title">審核資訊</div>';
  html += expandFieldRaw('狀態', '<span class="badge ' + storBadgeCls(d.status) + '">' + esc(d.status) + '</span>');
  var planBadgeCls = d.planType === '優選' ? 'badge-plan-premium' : d.planType === '精選' ? 'badge-plan-std' : 'badge-plan-free';
  var planIcon = d.planType === '優選' ? '👑 ' : d.planType === '精選' ? '⭐ ' : '🏠 ';
  html += expandFieldRaw('特約方案', '<span class="badge ' + planBadgeCls + '">' + planIcon + esc(d.planType || '免費') + '</span>');
  if (d.pinOrder > 0) html += expandField('置頂順序', '#' + d.pinOrder);
  if (d.note) html += expandField('管理員備註', d.note);
  if (d.lastUpdate) html += expandField('最後更新', fmtDate(d.lastUpdate));
  html += '</div>';
  html += '<div class="expand-actions">';
  html += '<a class="btn btn-primary" href="storedetail.html?id=' + encodeURIComponent(d.storeId) + '" onclick="event.stopPropagation()">';
  html += '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>審核商店</a>';
  if (d.planType === '優選' || d.planType === '精選') {
    html += '<div class="pin-ctrl" onclick="event.stopPropagation()">' +
      '<span style="font-size:12px;color:var(--lbl)">📌 置頂順序</span>' +
      '<input type="number" class="pin-order-input" id="spin-' + esc(d.storeId) + '" min="0" max="99" value="' + (d.pinOrder || 0) + '" placeholder="0=不置頂">' +
      '<button class="pin-save-btn" onclick="saveStorePinOrder(\'' + esc(d.storeId) + '\')">儲存</button>' +
      '</div>';
  }
  html += '</div></div>';
  return html;
}

function storToggle(id) { storExpandedId = (storExpandedId === id) ? null : id; storRender(); }

// ══════════════════════════════════════════════
// ── 置頂功能 ──
// ══════════════════════════════════════════════
function savePinOrder(caseId) {
  var input = document.getElementById('pin-' + caseId);
  if (!input) return;
  var order = parseInt(input.value, 10);
  if (isNaN(order) || order < 0) order = 0;
  apiCall('pinCase', { caseId: caseId, pinOrder: order }).then(json => {
    if (!json.success) { alert('儲存失敗：' + (json.error || '')); return; }
    var idx = allCases.findIndex(c => c.caseId === caseId);
    if (idx !== -1) allCases[idx].pinOrder = order;
    nbhRender();
  }).catch(() => { alert('網路錯誤'); });
}

function saveStorePinOrder(storeId) {
  var input = document.getElementById('spin-' + storeId);
  if (!input) return;
  var order = parseInt(input.value, 10);
  if (isNaN(order) || order < 0) order = 0;
  apiCall('setPinStore', { storeId: storeId, pinOrder: order }).then(json => {
    if (!json.success) { alert('儲存失敗：' + (json.error || '')); return; }
    var idx = allStores.findIndex(s => s.storeId === storeId);
    if (idx !== -1) allStores[idx].pinOrder = order;
    storRender();
  }).catch(() => { alert('網路錯誤'); });
}

// ══════════════════════════════════════════════
// ── ACC 帳號管理 ──
// ══════════════════════════════════════════════
var accEditingEmail = null;
var accPendingDeleteEmail = null;

function loadAdmins() {
  apiCall('getAdmins').then(json => {
    if (!json.success) throw new Error(json.error);
    allAdmins = json.admins || [];
    renderAdmins();
  }).catch(() => {
    document.getElementById('acc-tbody').innerHTML =
      '<tr><td colspan="4" style="padding:20px 16px;color:var(--muted);font-size:13px">載入失敗，請重新整理頁面。</td></tr>';
  });
}

function renderAdmins() {
  if (!allAdmins.length) {
    document.getElementById('acc-tbody').innerHTML =
      '<tr><td colspan="4" style="padding:20px 16px;color:var(--muted);font-size:13px">尚無帳號，請點「新增帳號」。</td></tr>';
    return;
  }
  var html = '';
  allAdmins.forEach(function(a) {
    var active = a.active === true || String(a.active).toUpperCase() === 'TRUE';
    var initials = esc((a.display_name || '?').charAt(0));
    var avCls = active ? 'active-av' : 'inactive-av';
    var rbCls = active ? 'active-rb' : 'inactive-rb';
    var toggleId = 'tog-' + esc(a.email).replace(/[^a-z0-9]/gi, '_');
    html += '<tr>';
    html += '<td><div class="acc-name-cell">';
    html += '<div class="acc-avatar ' + avCls + '">' + initials + '</div>';
    html += '<div><div class="acc-name">' + esc(a.display_name || '—') + '</div>';
    html += '<div class="acc-email">' + esc(a.email || '—') + '</div></div>';
    html += '</div></td>';
    html += '<td><span class="acc-role-badge ' + rbCls + '">' + esc(a.role || '管理員') + '</span></td>';
    html += '<td><label class="toggle" title="' + (active ? '啟用中，點擊停用' : '已停用，點擊啟用') + '">';
    html += '<input type="checkbox" id="' + toggleId + '"' + (active ? ' checked' : '') + ' onchange="accToggleActive(\'' + esc(a.email) + '\',' + active + ')">';
    html += '<span class="toggle-slider"></span></label></td>';
    html += '<td style="text-align:center"><div class="acc-actions" style="justify-content:center">';
    html += '<button class="icon-btn" title="編輯" onclick="accOpenModal(' + JSON.stringify(a) + ')">';
    html += '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    html += '</button>';
    html += '<button class="icon-btn danger" title="刪除" onclick="accConfirmDelete(\'' + esc(a.email) + '\',\'' + esc(a.display_name || a.email) + '\')">';
    html += '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
    html += '</button>';
    html += '</div></td>';
    html += '</tr>';
  });
  document.getElementById('acc-tbody').innerHTML = html;
}

function accOpenModal(admin) {
  accEditingEmail = admin ? admin.email : null;
  document.getElementById('acc-modal-title').textContent = admin ? '編輯帳號' : '新增帳號';
  document.getElementById('acc-f-name').value  = admin ? (admin.display_name || '') : '';
  document.getElementById('acc-f-email').value = admin ? (admin.email || '') : '';
  document.getElementById('acc-f-email').readOnly = !!admin;
  document.getElementById('acc-f-email').style.background = admin ? 'var(--bg)' : '';
  var roleEl = document.getElementById('acc-f-role');
  roleEl.value = (admin && admin.role) ? admin.role : '管理員';
  document.getElementById('acc-modal-err').style.display = 'none';
  document.getElementById('acc-modal-save').disabled = false;
  document.getElementById('acc-modal-backdrop').classList.add('open');
  setTimeout(function(){ document.getElementById(admin ? 'acc-f-name' : 'acc-f-name').focus(); }, 50);
}

function accCloseModal(e) {
  if (e && e.target !== document.getElementById('acc-modal-backdrop')) return;
  document.getElementById('acc-modal-backdrop').classList.remove('open');
}

function accSaveModal() {
  var name  = document.getElementById('acc-f-name').value.trim();
  var email = document.getElementById('acc-f-email').value.trim().toLowerCase();
  var role  = document.getElementById('acc-f-role').value;
  var errEl = document.getElementById('acc-modal-err');
  var saveBtn = document.getElementById('acc-modal-save');

  if (!name) { errEl.textContent = '請填寫顯示名稱。'; errEl.style.display = 'block'; return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { errEl.textContent = '請填寫有效的電子郵件。'; errEl.style.display = 'block'; return; }

  errEl.style.display = 'none';
  saveBtn.disabled = true;
  saveBtn.textContent = '儲存中…';

  var action = accEditingEmail ? 'updateAdmin' : 'addAdmin';
  var payload = { display_name: name, email: email, role: role };
  if (accEditingEmail) payload.target_email = accEditingEmail;

  apiCall(action, payload).then(function(json) {
    saveBtn.textContent = '儲存';
    if (!json.success) {
      errEl.textContent = json.error || '儲存失敗，請再試一次。';
      errEl.style.display = 'block';
      saveBtn.disabled = false;
      return;
    }
    document.getElementById('acc-modal-backdrop').classList.remove('open');
    loadAdmins();
  }).catch(function() {
    saveBtn.textContent = '儲存';
    saveBtn.disabled = false;
    errEl.textContent = '網路錯誤，請再試一次。';
    errEl.style.display = 'block';
  });
}

function accToggleActive(email, currentActive) {
  apiCall('updateAdmin', { target_email: email, active: !currentActive }).then(function(json) {
    if (!json.success) { loadAdmins(); return; }
    var idx = allAdmins.findIndex(function(a){ return a.email === email; });
    if (idx !== -1) allAdmins[idx].active = !currentActive;
    renderAdmins();
  }).catch(function() { loadAdmins(); });
}

function accConfirmDelete(email, name) {
  accPendingDeleteEmail = email;
  document.getElementById('acc-confirm-msg').textContent = '確定要刪除帳號「' + name + '」嗎？';
  document.getElementById('acc-confirm-backdrop').classList.add('open');
}

function accCloseConfirm(e) {
  if (e && e.target !== document.getElementById('acc-confirm-backdrop')) return;
  document.getElementById('acc-confirm-backdrop').classList.remove('open');
  accPendingDeleteEmail = null;
}

function accDeleteConfirmed() {
  if (!accPendingDeleteEmail) return;
  var email = accPendingDeleteEmail;
  var btn = document.getElementById('acc-confirm-ok');
  btn.disabled = true;
  btn.textContent = '刪除中…';
  apiCall('deleteAdmin', { target_email: email }).then(function(json) {
    btn.textContent = '刪除';
    btn.disabled = false;
    document.getElementById('acc-confirm-backdrop').classList.remove('open');
    accPendingDeleteEmail = null;
    if (json.success) {
      allAdmins = allAdmins.filter(function(a){ return a.email !== email; });
      renderAdmins();
    }
  }).catch(function() {
    btn.textContent = '刪除';
    btn.disabled = false;
  });
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('acc-modal-backdrop').classList.remove('open');
    document.getElementById('acc-confirm-backdrop').classList.remove('open');
  }
});

    '載入失敗，請重新整理</td></tr>';
}
