<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件管理後台 - 和平里通報系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
img{display:block;max-width:100%}
button{cursor:pointer;font-family:inherit}

:root{
  --bg:        #F5F2EE;
  --card:      #FFFFFF;
  --border:    #E2D9CF;
  --divider:   #EDE7DF;
  --lbl:       #8C7B6A;
  --val:       #2C2018;
  --muted:     #B8A898;
  --heading:   #1E160E;
  --primary:       #4B7A52;
  --primary-light: #EAF3EB;
  --primary-dark:  #3A5E3F;
  --warn:      #C0582A;
  --warn-bg:   #FDF0EA;
  --badge-new-bg:  #EBF3FF; --badge-new-txt: #1A56A8;
  --badge-proc-bg: #FFF3E0; --badge-proc-txt: #B75D00;
  --badge-fwd-bg:  #F3EBFF; --badge-fwd-txt:  #6B28A8;
  --badge-done-bg: #EAF3EB; --badge-done-txt: #2F6836;
  --badge-grey-bg: #F0EEEC; --badge-grey-txt: #7A6E66;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
  --shadow-md: 0 4px 16px rgba(0,0,0,.10);
  --radius: 10px;
  --font: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  --topbar-h: 56px;
}

body{
  font-family: var(--font);
  background: var(--bg);
  color: var(--val);
  font-size: 14px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Login Screen ── */
#loginScreen{
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 500; padding: 40px;
}
.login-logo{
  width: 72px; height: 72px;
  background: var(--primary);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px;
  box-shadow: 0 6px 20px rgba(75,122,82,.35);
}
.login-title{
  font-size: 22px; font-weight: 700;
  color: var(--heading); margin-bottom: 6px;
}
.login-sub{
  font-size: 14px; color: var(--lbl);
  margin-bottom: 32px; text-align: center; line-height: 1.6;
}
#loginBtnWrap{
  display: flex; justify-content: center;
}
.login-error{
  margin-top: 16px;
  font-size: 13px; color: var(--warn);
  background: var(--warn-bg);
  padding: 10px 18px; border-radius: 8px;
  display: none;
}

/* ── Top bar ── */
#appShell{ display: none; }
.topbar{
  height: var(--topbar-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow-sm);
}
.topbar-brand{
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 700;
  color: var(--heading);
}
.topbar-brand-icon{
  width: 30px; height: 30px;
  background: var(--primary);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.topbar-divider{
  width: 1px; height: 20px; background: var(--border);
}
.topbar-sub{
  font-size: 13px; color: var(--lbl); font-weight: 400;
}
.topbar-spacer{ flex: 1; }
.topbar-user{
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--lbl);
}
.topbar-avatar{
  width: 30px; height: 30px;
  background: var(--primary-light);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  color: var(--primary);
}
.logout-btn{
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  font-size: 12px; color: var(--lbl);
  transition: background .15s;
}
.logout-btn:hover{ background: var(--bg); }

/* ── Content area ── */
.content{ padding: 20px 24px 60px; }

/* ── Summary chips ── */
.summary-row{
  display: flex; gap: 10px; margin-bottom: 16px;
  flex-wrap: wrap;
}
.summary-chip{
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px; color: var(--lbl);
  cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.summary-chip:hover{ background: var(--divider); }
.summary-chip.active{
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.summary-chip .chip-num{
  font-size: 16px; font-weight: 700;
  color: var(--heading);
}
.summary-chip.active .chip-num{ color: var(--primary); }
.chip-dot{
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

/* ── Toolbar ── */
.toolbar{
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; flex-wrap: wrap;
}
.search-wrap{
  flex: 1; min-width: 220px; max-width: 360px;
  position: relative; display: flex; align-items: center;
}
.search-wrap svg{
  position: absolute; left: 10px;
  color: var(--muted); pointer-events: none; flex-shrink: 0;
}
.search-input{
  width: 100%; padding: 7px 10px 7px 34px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--card);
  font-family: var(--font); font-size: 13px;
  color: var(--val); outline: none;
  transition: border-color .15s;
}
.search-input:focus{ border-color: var(--primary); }
.toolbar-right{ display: flex; gap: 8px; align-items: center; margin-left: auto; }
.result-count{
  font-size: 12px; color: var(--muted);
}

/* ── Table wrapper ── */
.table-wrap{
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.data-table{
  width: 100%;
  border-collapse: collapse;
}
.data-table thead th{
  padding: 10px 14px;
  text-align: left;
  font-size: 11px; font-weight: 700;
  color: var(--lbl); letter-spacing: .6px;
  text-transform: uppercase;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: background .1s;
}
.data-table thead th:hover{ background: var(--divider); }
.data-table thead th.sorted{ color: var(--primary); }
.sort-icon{ opacity: .4; margin-left: 4px; }
.data-table thead th.sorted .sort-icon{ opacity: 1; }

.data-table tbody tr{
  border-bottom: 1px solid var(--divider);
  transition: background .1s;
  cursor: pointer;
}
.data-table tbody tr:last-child{ border-bottom: none; }
.data-table tbody tr:hover > td{ background: #FAFAF8; }
.data-table tbody tr.expanded > td{ background: var(--primary-light); }
.data-table tbody tr.expanded > td:first-child{
  border-left: 3px solid var(--primary);
}

.data-table td{
  padding: 11px 14px;
  font-size: 13px; color: var(--val);
  vertical-align: middle;
}

td.col-id{
  font-size: 11px; color: var(--muted);
  font-weight: 600; letter-spacing: .4px;
  white-space: nowrap;
}
td.col-title{
  font-weight: 600; color: var(--heading);
  max-width: 280px;
}
td.col-title span{
  display: block;
  overflow: hidden; white-space: nowrap;
  text-overflow: ellipsis;
  max-width: 280px;
}
td.col-cate, td.col-date, td.col-handler{
  white-space: nowrap; color: var(--lbl);
}
td.col-addr span{
  display: block; max-width: 160px;
  overflow: hidden; white-space: nowrap;
  text-overflow: ellipsis;
  color: var(--lbl);
}
td.col-status{ white-space: nowrap; }
td.col-expand{
  width: 32px; text-align: center;
  color: var(--muted);
}
.expand-icon{ transition: transform .2s; }
tr.expanded .expand-icon{ transform: rotate(180deg); }

/* ── Badge ── */
.badge{
  display: inline-flex; align-items: center;
  padding: 2px 9px; border-radius: 999px;
  font-size: 11px; font-weight: 700;
}
.badge-new  { background: var(--badge-new-bg);  color: var(--badge-new-txt); }
.badge-proc { background: var(--badge-proc-bg); color: var(--badge-proc-txt); }
.badge-fwd  { background: var(--badge-fwd-bg);  color: var(--badge-fwd-txt); }
.badge-done { background: var(--badge-done-bg); color: var(--badge-done-txt); }
.badge-grey { background: var(--badge-grey-bg); color: var(--badge-grey-txt); }

/* ── Expand panel ── */
.expand-row td{
  padding: 0 !important;
  background: #FAFAFA !important;
  cursor: default;
}
.expand-panel{
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  border-top: 1px solid var(--divider);
}
.expand-section-title{
  font-size: 11px; font-weight: 700;
  color: var(--lbl); letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.expand-field{ margin-bottom: 8px; }
.expand-field-lbl{
  font-size: 11px; color: var(--muted);
  margin-bottom: 2px;
}
.expand-field-val{
  font-size: 13px; color: var(--val);
  line-height: 1.5; word-break: break-word;
}
.expand-field-val.empty{ color: var(--muted); font-style: italic; }
.expand-photos{
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 6px;
}
.expand-photos img{
  width: 80px; height: 60px;
  object-fit: cover; border-radius: 6px;
  border: 1px solid var(--border);
  cursor: pointer; transition: transform .15s;
}
.expand-photos img:hover{ transform: scale(1.05); }
.expand-actions{
  grid-column: 1 / -1;
  display: flex; align-items: center;
  gap: 10px; padding-top: 12px;
  border-top: 1px solid var(--divider);
}
.btn{
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 7px;
  font-size: 13px; font-weight: 600;
  border: none; transition: all .15s; text-decoration: none;
}
.btn-primary{
  background: var(--primary); color: #fff;
  box-shadow: 0 2px 6px rgba(75,122,82,.25);
}
.btn-primary:hover{ background: var(--primary-dark); }
.btn-secondary{
  background: var(--bg); color: var(--lbl);
  border: 1px solid var(--border);
}
.btn-secondary:hover{ background: var(--divider); }

/* ── Empty state ── */
.empty-row td{
  padding: 60px 24px !important;
  text-align: center; color: var(--lbl);
  cursor: default;
}
.empty-row td svg{ display: block; margin: 0 auto 12px; opacity: .35; }

/* ── Skeleton ── */
.skel{
  background: linear-gradient(90deg,var(--divider) 25%,#ece6de 50%,var(--divider) 75%);
  background-size: 300% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Lightbox ── */
.lightbox{
  position: fixed; inset: 0; background: rgba(0,0,0,.88);
  z-index: 600; display: none;
  align-items: center; justify-content: center;
}
.lightbox.open{ display: flex; }
.lightbox img{ max-width: 92vw; max-height: 88vh; border-radius: 10px; }
.lb-close{
  position: absolute; top: 18px; right: 18px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: none;
  color: #fff; font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.lb-close:hover{ background: rgba(255,255,255,.3); }
</style>
</head>
<body>

<!-- ── Lightbox ── -->
<div class="lightbox" id="lightbox" onclick="closeLb()">
  <button class="lb-close" onclick="closeLb()">&#215;</button>
  <img id="lbImg" src="" alt="">
</div>

<!-- ── Login Screen ── -->
<div id="loginScreen">
  <div class="login-logo">
    <svg width="32" height="32" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </div>
  <div class="login-title">案件管理後台</div>
  <div class="login-sub">北屯區和平里・里民通報系統<br>請以管理員 Google 帳號登入</div>
  <div id="loginBtnWrap"></div>
  <div class="login-error" id="loginError">此帳號沒有管理員權限，請聯絡系統管理員。</div>
</div>

<!-- ── App Shell ── -->
<div id="appShell">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">
        <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      和平里通報系統
    </div>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">案件管理後台</span>
    <div class="topbar-spacer"></div>
    <div class="topbar-user">
      <div class="topbar-avatar" id="topbarAvatar">?</div>
      <span id="topbarName">載入中</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">登出</button>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Summary chips -->
    <div class="summary-row" id="summaryRow">
      <div class="summary-chip active" data-filter="all" onclick="setFilter('all', this)">
        <span class="chip-num" id="cnt-all">–</span>
        <span>全部案件</span>
      </div>
      <div class="summary-chip" data-filter="新案件" onclick="setFilter('新案件', this)">
        <span class="chip-dot" style="background:var(--badge-new-txt)"></span>
        <span class="chip-num" id="cnt-new">–</span>
        <span>新案件</span>
      </div>
      <div class="summary-chip" data-filter="處理中" onclick="setFilter('處理中', this)">
        <span class="chip-dot" style="background:var(--badge-proc-txt)"></span>
        <span class="chip-num" id="cnt-proc">–</span>
        <span>處理中</span>
      </div>
      <div class="summary-chip" data-filter="轉交" onclick="setFilter('轉交', this)">
        <span class="chip-dot" style="background:var(--badge-fwd-txt)"></span>
        <span class="chip-num" id="cnt-fwd">–</span>
        <span>已轉交</span>
      </div>
      <div class="summary-chip" data-filter="結案" onclick="setFilter('結案', this)">
        <span class="chip-dot" style="background:var(--badge-done-txt)"></span>
        <span class="chip-num" id="cnt-done">–</span>
        <span>已結案</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="search-input" id="searchInput"
          placeholder="搜尋案件號、標題、地點、通報人…"
          oninput="renderTable()">
      </div>
      <div class="toolbar-right">
        <span class="result-count" id="resultCount"></span>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="data-table" id="dataTable">
        <thead>
          <tr>
            <th onclick="sortBy('caseId')"    id="th-caseId">
              案件號<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('reportTime')" id="th-reportTime">
              通報日期<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('status')"    id="th-status">
              狀態<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('category')"  id="th-category">
              類別<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('title')"     id="th-title">
              案件主旨<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('addr')"      id="th-addr">
              地點<span class="sort-icon">↕</span></th>
            <th onclick="sortBy('handler')"   id="th-handler">
              承辦人<span class="sort-icon">↕</span></th>
            <th style="width:32px;cursor:default"></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- skeleton -->
          <tr><td colspan="8" style="padding:0">
            <div style="padding:14px 14px;display:flex;flex-direction:column;gap:10px">
              <div class="skel" style="height:16px;width:100%"></div>
              <div class="skel" style="height:16px;width:90%"></div>
              <div class="skel" style="height:16px;width:95%"></div>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>

  </div><!-- /.content -->
</div><!-- /#appShell -->

<script src="config.js"></script>
<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
var SPREADSHEET_ID  = '1SDwkiqi2EJoW0ICZLeBVRC7IM5ridvHgxS-tFoh_BWE';
var SHEET_CASES     = '案件清單';
var SHEET_ADMINS    = '管理員名單';

var COL = {
  caseId:0, reportTime:1, status:2, category:3,
  name:4, phone:5, lineId:6,
  title:7, desc:8, addr:9, mapUrl:10,
  case1999:11,
  photo1:12, photo2:13, photo3:14,
  replyTime:15, lastUpdate:16, replyContent:17,
  repPhoto1:18, repPhoto2:19, repPhoto3:20,
  handler:21, note:22,
  publicFlag:23
};

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
var gName      = '';
var gEmail     = '';
var adminName  = '';   // display_name from sheet
var allCases   = [];
var currentFilter = 'all';
var sortCol    = 'reportTime';
var sortAsc    = false;
var expandedId = null;

// ─────────────────────────────────────────────
// AUTH — GOOGLE SIGN-IN
// ─────────────────────────────────────────────
function initGoogle() {
  if (!CONFIG.GOOGLE_CLIENT_ID) return;
  if (typeof google === 'undefined') {
    setTimeout(initGoogle, 300); return;
  }
  google.accounts.id.initialize({
    client_id: CONFIG.GOOGLE_CLIENT_ID,
    callback: onGoogleSignIn,
    auto_select: true,
  });
  google.accounts.id.renderButton(
    document.getElementById('loginBtnWrap'), {
      type: 'standard', theme: 'filled_blue', size: 'large',
      text: 'signin_with', locale: 'zh-TW', width: 280
    }
  );
  google.accounts.id.prompt();
}

function onGoogleSignIn(resp) {
  var parts = resp.credential.split('.');
  try {
    var pad = parts[1].replace(/-/g,'+').replace(/_/g,'/');
    while (pad.length % 4) pad += '=';
    var payload = JSON.parse(decodeURIComponent(escape(atob(pad))));
    gName  = payload.name  || payload.given_name || '';
    gEmail = (payload.email || '').toLowerCase().trim();
    checkAdminFromSheet();
  } catch(e) {
    showLoginError();
  }
}

// 從試算表「管理員名單」讀取，比對 email
function checkAdminFromSheet() {
  var url = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID
          + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SHEET_ADMINS)
          + '&headers=1';
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(text){
      var json = JSON.parse(text.replace(/^[^{]*/,'').replace(/\);?\s*$/,''));
      var rows = (json.table && json.table.rows) || [];
      // 欄位：username(0) password(1) display_name(2) role(3) active(4) email(5)
      var matched = rows.find(function(r){
        var c = r.c || [];
        var email  = c[5] ? String(c[5].v || '').toLowerCase().trim() : '';
        var active = c[4] ? String(c[4].v || '').toUpperCase() : '';
        return email === gEmail && active === 'TRUE';
      });
      if (!matched) {
        showLoginError(); return;
      }
      var c = matched.c || [];
      adminName = (c[2] && c[2].v) ? String(c[2].v) : gName;
      enterApp();
    })
    .catch(function(){ showLoginError(); });
}

function showLoginError() {
  document.getElementById('loginError').style.display = 'block';
}

function enterApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  var initial = adminName ? adminName.charAt(0) : '?';
  document.getElementById('topbarAvatar').textContent = initial;
  document.getElementById('topbarName').textContent = adminName;
  loadCases();
}

function doLogout() {
  if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
  location.reload();
}

window.addEventListener('load', function(){
  var tries = 0;
  var t = setInterval(function(){
    if (typeof google !== 'undefined' || ++tries > 30){
      clearInterval(t); initGoogle();
    }
  }, 200);
});

// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
function loadCases() {
  var url = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID
          + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(SHEET_CASES)
          + '&headers=1';
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(text){
      var json = JSON.parse(text.replace(/^[^{]*/,'').replace(/\);?\s*$/,''));
      var rows = (json.table && json.table.rows) || [];
      allCases = rows.map(function(r){
        var c = r.c || [];
        var obj = {};
        Object.keys(COL).forEach(function(k){
          var cell = c[COL[k]];
          obj[k] = cell ? (cell.f || cell.v || '') : '';
        });
        return obj;
      }).filter(function(d){ return d.caseId; });
      buildSummaryCounts();
      renderTable();
    })
    .catch(function(){
      document.getElementById('tableBody').innerHTML =
        '<tr class="empty-row"><td colspan="8">' +
        '<svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
        '載入失敗，請重新整理</td></tr>';
    });
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function esc(s){
  if (!s && s !== 0) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function v(s){ return (s && String(s).trim()) ? esc(s) : '<span class="empty">—</span>'; }

function badgeCls(s){
  if (!s) return 'badge-proc';
  if (s.indexOf('新案件') !== -1) return 'badge-new';
  if (s.indexOf('處理中') !== -1) return 'badge-proc';
  if (s.indexOf('轉交')   !== -1) return 'badge-fwd';
  if (s.indexOf('結案')   !== -1) return 'badge-done';
  if (s.indexOf('不受理') !== -1) return 'badge-grey';
  return 'badge-proc';
}

function parseDate(ts){
  if (!ts) return null;
  var dm = String(ts).match(/Date\((\d+),(\d+),(\d+)/);
  if (dm) return new Date(+dm[1], +dm[2], +dm[3]);
  var d = new Date(ts); return isNaN(d) ? null : d;
}
function fmtDate(ts){
  var d = parseDate(ts); if (!d) return '—';
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function statusWeight(s){
  if (!s) return 9;
  if (s.indexOf('新案件') !== -1) return 1;
  if (s.indexOf('處理中') !== -1) return 2;
  if (s.indexOf('轉交')   !== -1) return 3;
  if (s.indexOf('結案')   !== -1) return 4;
  if (s.indexOf('不受理') !== -1) return 5;
  return 9;
}
function caseIdNum(id){
  if (!id) return 0;
  var m = String(id).match(/(\d+)/);
  return m ? parseInt(m[1], 10) : 0;
}

// ─────────────────────────────────────────────
// SUMMARY COUNTS
// ─────────────────────────────────────────────
function buildSummaryCounts(){
  var cnt = { all: allCases.length, new: 0, proc: 0, fwd: 0, done: 0 };
  allCases.forEach(function(d){
    var s = d.status || '';
    if (s.indexOf('新案件') !== -1) cnt.new++;
    else if (s.indexOf('處理中') !== -1) cnt.proc++;
    else if (s.indexOf('轉交') !== -1)  cnt.fwd++;
    else if (s.indexOf('結案') !== -1)  cnt.done++;
  });
  document.getElementById('cnt-all').textContent  = cnt.all;
  document.getElementById('cnt-new').textContent  = cnt.new;
  document.getElementById('cnt-proc').textContent = cnt.proc;
  document.getElementById('cnt-fwd').textContent  = cnt.fwd;
  document.getElementById('cnt-done').textContent = cnt.done;
}

// ─────────────────────────────────────────────
// FILTER & SORT
// ─────────────────────────────────────────────
var _currentFilter = 'all';

function setFilter(f, el){
  _currentFilter = f;
  document.querySelectorAll('.summary-chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active');
  expandedId = null;
  renderTable();
}

function sortBy(col){
  if (sortCol === col) { sortAsc = !sortAsc; }
  else { sortCol = col; sortAsc = true; }
  document.querySelectorAll('thead th').forEach(function(th){ th.classList.remove('sorted'); });
  var th = document.getElementById('th-' + col);
  if (th) {
    th.classList.add('sorted');
    th.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓';
  }
  renderTable();
}

// ─────────────────────────────────────────────
// RENDER TABLE
// ─────────────────────────────────────────────
function renderTable(){
  var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  var f = _currentFilter;

  var list = allCases.filter(function(d){
    // Status filter
    if (f !== 'all'){
      var s = d.status || '';
      if (s.indexOf(f) === -1) return false;
    }
    // Search
    if (q){
      var hay = [d.caseId, d.title, d.addr, d.category,
                 d.name, d.phone, d.handler, d.desc, d.replyContent].join(' ').toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });

  // Sort
  list.sort(function(a, b){
    var av, bv;
    if (sortCol === 'reportTime' || sortCol === 'replyTime'){
      av = parseDate(a[sortCol]) ? parseDate(a[sortCol]).getTime() : 0;
      bv = parseDate(b[sortCol]) ? parseDate(b[sortCol]).getTime() : 0;
    } else if (sortCol === 'status'){
      av = statusWeight(a.status); bv = statusWeight(b.status);
    } else if (sortCol === 'caseId'){
      av = caseIdNum(a.caseId); bv = caseIdNum(b.caseId);
    } else {
      av = String(a[sortCol] || '').toLowerCase();
      bv = String(b[sortCol] || '').toLowerCase();
    }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ?  1 : -1;
    return 0;
  });

  document.getElementById('resultCount').textContent =
    '共 ' + list.length + ' 筆' + (f !== 'all' || q ? '（篩選中）' : '');

  var tbody = document.getElementById('tableBody');
  if (!list.length){
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">' +
      '<svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
      '沒有符合的案件</td></tr>';
    return;
  }

  var html = '';
  list.forEach(function(d){
    var isExp = expandedId === d.caseId;
    html += '<tr class="case-row' + (isExp ? ' expanded' : '') + '" onclick="toggleExpand(\'' + esc(d.caseId) + '\')">';
    html += '<td class="col-id">' + esc(d.caseId) + '</td>';
    html += '<td class="col-date">' + fmtDate(d.reportTime) + '</td>';
    html += '<td class="col-status"><span class="badge ' + badgeCls(d.status) + '">' + esc(d.status || '—') + '</span></td>';
    html += '<td class="col-cate">' + esc(d.category || '—') + '</td>';
    html += '<td class="col-title"><span>' + esc(d.title || '（無標題）') + '</span></td>';
    html += '<td class="col-addr"><span>' + esc(d.addr || '—') + '</span></td>';
    html += '<td class="col-handler">' + esc(d.handler || '—') + '</td>';
    html += '<td class="col-expand"><svg class="expand-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></td>';
    html += '</tr>';

    if (isExp){
      html += '<tr class="expand-row"><td colspan="8">';
      html += buildExpandPanel(d);
      html += '</td></tr>';
    }
  });

  tbody.innerHTML = html;
}

// ─────────────────────────────────────────────
// EXPAND PANEL
// ─────────────────────────────────────────────
function buildExpandPanel(d){
  var photos    = [d.photo1, d.photo2, d.photo3].filter(Boolean);
  var repPhotos = [d.repPhoto1, d.repPhoto2, d.repPhoto3].filter(Boolean);

  var html = '<div class="expand-panel">';

  // Col 1: 通報資訊
  html += '<div>';
  html += '<div class="expand-section-title">通報資訊</div>';
  html += expandField('通報類別', d.category);
  html += expandField('發生地點', d.addr);
  html += expandField('問題描述', d.desc);
  if (d.case1999) html += expandField('1999案號', d.case1999);
  if (photos.length){
    html += '<div class="expand-field"><div class="expand-field-lbl">通報照片</div>';
    html += '<div class="expand-photos">';
    photos.forEach(function(p){ html += '<img src="' + esc(p) + '" alt="" onclick="event.stopPropagation();openLb(\'' + esc(p) + '\')">'; });
    html += '</div></div>';
  }
  html += '</div>';

  // Col 2: 通報人資訊
  html += '<div>';
  html += '<div class="expand-section-title">通報人資訊</div>';
  html += expandField('姓名', d.name);
  html += expandField('電話', d.phone);
  if (d.lineId) html += expandField('LINE ID', d.lineId);
  html += '</div>';

  // Col 3: 里長回覆
  html += '<div>';
  html += '<div class="expand-section-title">里長回覆</div>';
  if (d.replyContent){
    html += expandField('回覆時間', fmtDate(d.replyTime));
    html += expandField('回覆內容', d.replyContent);
    html += expandField('承辦人',   d.handler);
    if (d.note) html += expandField('備註', d.note);
    if (repPhotos.length){
      html += '<div class="expand-field"><div class="expand-field-lbl">處理照片</div>';
      html += '<div class="expand-photos">';
      repPhotos.forEach(function(p){ html += '<img src="' + esc(p) + '" alt="" onclick="event.stopPropagation();openLb(\'' + esc(p) + '\')">'; });
      html += '</div></div>';
    }
  } else {
    html += '<div style="color:var(--muted);font-size:13px;font-style:italic">尚未填寫回覆</div>';
  }
  html += '</div>';

  // Actions
  html += '<div class="expand-actions">';
  html += '<a class="btn btn-primary" href="detail.html?id=' + encodeURIComponent(d.caseId) + '" onclick="event.stopPropagation()">';
  html += '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  html += '編輯回覆</a>';
  html += '<span style="font-size:12px;color:var(--muted)">案件號：' + esc(d.caseId) + '</span>';
  html += '</div>';

  html += '</div>'; // expand-panel
  return html;
}

function expandField(lbl, val){
  var display = (val && String(val).trim())
    ? '<div class="expand-field-val">' + esc(val) + '</div>'
    : '<div class="expand-field-val empty">—</div>';
  return '<div class="expand-field"><div class="expand-field-lbl">' + lbl + '</div>' + display + '</div>';
}

function toggleExpand(id){
  expandedId = (expandedId === id) ? null : id;
  renderTable();
}

// ─────────────────────────────────────────────
// LIGHTBOX
// ─────────────────────────────────────────────
function openLb(url){
  document.getElementById('lbImg').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLb(){
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeLb();
});
</script>
