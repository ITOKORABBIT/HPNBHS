<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>里民公告 - 和平里里民通報系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
img{display:block;max-width:100%}
button{cursor:pointer;font-family:inherit}

:root{
  --bg:        #F5F2EE;
  --card:      #FFFFFF;
  --border:    #E2D9CF;
  --divider:   #EDE7DF;
  --lbl:       #8C7B6A;
  --val:       #2C2018;
  --muted:     #B8A898;
  --heading:   #1E160E;
  --primary:       #4B7A52;
  --primary-light: #EAF3EB;
  --primary-dark:  #3A5E3F;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
  --shadow-md: 0 2px 8px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --radius: 10px;
  --font: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
}

body{
  font-family: var(--font);
  background: var(--bg);
  color: var(--val);
  font-size: 15px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Page header ── */
.page-header{
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 54px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
}
.header-title{
  flex: 1;
  font-size: 16px; font-weight: 700;
  color: var(--heading);
  text-align: center;
}
.header-subtitle{
  font-size: 12px; font-weight: 400;
  color: var(--lbl); margin-top: 1px;
}
.report-btn{
  display: flex; align-items: center; gap: 5px;
  padding: 7px 13px;
  border-radius: 8px;
  border: none;
  background: var(--primary);
  font-size: 13px; font-weight: 600;
  color: #fff;
  transition: background .15s;
  white-space: nowrap;
}
.report-btn:hover{ background: var(--primary-dark); }

/* ── Filter bar ── */
.filter-wrap{
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 54px; z-index: 90;
}
.filter-bar{
  padding: 8px 16px;
  display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap;
}
.search-wrap{
  flex: 1; min-width: 180px;
  position: relative;
  display: flex; align-items: center;
}
.search-wrap svg{
  position: absolute; left: 10px;
  color: var(--muted); pointer-events: none;
}
.search-input{
  width: 100%; padding: 7px 10px 7px 34px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-family: var(--font); font-size: 13px;
  color: var(--val); outline: none;
  transition: border-color .15s;
}
.search-input:focus{ border-color: var(--primary); }

/* ── Dropdown ── */
.dropdown{ position: relative; }
.dropdown-btn{
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 13px; font-weight: 600;
  color: var(--lbl);
  transition: all .15s; white-space: nowrap;
}
.dropdown-btn:hover{ background: var(--divider); }
.dropdown-btn.active{ background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.dropdown-btn .chevron{ transition: transform .2s; flex-shrink: 0; }
.dropdown-btn.open .chevron{ transform: rotate(180deg); }
.dropdown-panel{
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 6px 24px rgba(0,0,0,.13);
  z-index: 300; min-width: 170px;
  display: none; overflow: hidden;
}
.dropdown-panel.open{ display: block; }
.dropdown-list{ max-height: 230px; overflow-y: auto; padding: 4px 0; }
.dropdown-item{
  padding: 8px 14px;
  font-size: 13px; color: var(--val);
  cursor: pointer; transition: background .1s;
}
.dropdown-item:hover{ background: var(--bg); }
.dropdown-item.selected{ color: var(--primary); font-weight: 700; background: var(--primary-light); }

/* ── Result bar ── */
.result-bar{
  padding: 10px 16px 4px;
  font-size: 12px; color: var(--lbl);
}
.result-bar strong{ color: var(--primary); }

/* ── Card grid ── */
.card-grid{
  padding: 4px 12px 100px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 12px;
}

/* ── Case card ── */
.case-card{
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  display: flex; flex-direction: column;
  border-left: 3px solid var(--primary);
}
.case-card:hover{
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.card-thumb{
  width: 100%; aspect-ratio: 16/9;
  background: var(--divider);
  overflow: hidden; flex-shrink: 0;
  position: relative;
}
.card-thumb img{
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .3s;
}
.case-card:hover .card-thumb img{ transform: scale(1.04); }
.card-thumb-placeholder{
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #F0EBE4 0%, #EDE7DF 100%);
}

.card-body{
  padding: 12px 14px 14px;
  flex: 1; display: flex; flex-direction: column;
}
.card-top{
  display: flex; align-items: center;
  gap: 7px; margin-bottom: 8px; flex-wrap: wrap;
}
.badge-done{
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 700;
  background: #EAF3EB; color: #2F6836;
}
.card-title{
  font-size: 14px; font-weight: 700;
  color: var(--heading); line-height: 1.45;
  margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-desc{
  font-size: 12px; color: var(--lbl);
  line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
  flex: 1;
}
.card-footer{
  margin-top: 10px; padding-top: 8px;
  border-top: 1px solid var(--divider);
  display: flex; align-items: center;
  justify-content: space-between;
  font-size: 11px; color: var(--muted);
}

/* ── Empty / Loading ── */
.state-wrap{
  grid-column: 1 / -1;
  text-align: center; padding: 60px 24px;
  color: var(--lbl);
}
.state-wrap svg{ margin: 0 auto 16px; opacity: .4; }
.state-wrap h3{ font-size: 16px; color: var(--heading); margin-bottom: 6px; }
.state-wrap p{ font-size: 13px; }

.skel{
  background: linear-gradient(90deg,var(--divider) 25%,#ece6de 50%,var(--divider) 75%);
  background-size: 300% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 5px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
}

@media(max-width: 480px){
  .card-grid{ grid-template-columns: 1fr; padding: 4px 10px 80px; }
  .filter-bar{ flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- ── Page header ── -->
<div class="page-header">
  <div style="width:60px"></div>
  <div class="header-title">
    <div>里民公告</div>
    <div class="header-subtitle" id="headerSubtitle">和平里里民通報系統</div>
  </div>
  <button class="report-btn" onclick="window.location.href='report.html'">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    通報
  </button>
</div>

<!-- ── Filter bar ── -->
<div class="filter-wrap">
<div class="filter-bar">

  <!-- Category dropdown -->
  <div class="dropdown" id="categoryDropdown">
    <button class="dropdown-btn" id="categoryBtn" onclick="toggleDropdown('categoryDropdown')">
      <span id="categoryLabel">全部類別</span>
      <svg class="chevron" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="dropdown-panel" id="categoryPanel">
      <div class="dropdown-list" id="categoryList">
        <div class="dropdown-item selected" data-value="all" onclick="selectCategory(this)">全部類別</div>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" class="search-input" id="searchInput" placeholder="搜尋公告…" oninput="applyFilters()">
  </div>

</div>
</div>

<!-- ── Result bar ── -->
<div class="result-bar" id="resultBar">載入中…</div>

<!-- ── Card grid ── -->
<div class="card-grid" id="cardGrid">
  <div class="skel-card" style="height:220px">
    <div class="skel" style="height:130px;border-radius:0"></div>
    <div style="padding:12px 14px">
      <div class="skel" style="height:12px;width:50%;margin-bottom:8px"></div>
      <div class="skel" style="height:15px;width:85%;margin-bottom:6px"></div>
      <div class="skel" style="height:12px;width:65%"></div>
    </div>
  </div>
  <div class="skel-card" style="height:220px">
    <div class="skel" style="height:130px;border-radius:0"></div>
    <div style="padding:12px 14px">
      <div class="skel" style="height:12px;width:40%;margin-bottom:8px"></div>
      <div class="skel" style="height:15px;width:90%;margin-bottom:6px"></div>
      <div class="skel" style="height:12px;width:70%"></div>
    </div>
  </div>
  <div class="skel-card" style="height:220px">
    <div class="skel" style="height:130px;border-radius:0"></div>
    <div style="padding:12px 14px">
      <div class="skel" style="height:12px;width:55%;margin-bottom:8px"></div>
      <div class="skel" style="height:15px;width:75%;margin-bottom:6px"></div>
      <div class="skel" style="height:12px;width:60%"></div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
// ──────────────────────────────────────────
// API HELPER（公開端點不需 session）
// ──────────────────────────────────────────
function apiCall(action, extra) {
  var payload = Object.assign({ action: action }, extra || {});
  return fetch(CONFIG.SCRIPT_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(function(r){ return r.text(); })
  .then(function(t){ return JSON.parse(t); });
}

// ──────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────
function esc(s) {
  if (!s && s !== 0) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var CATE_COLOR = {
  '交通':    { bg:'#EBF3FF', txt:'#1A56A8' },
  '環境':    { bg:'#EAF3EB', txt:'#2F6836' },
  '噪音':    { bg:'#FFF3E0', txt:'#B75D00' },
  '公共設施': { bg:'#E0F7FA', txt:'#006B6B' },
  '治安':    { bg:'#FEE2E2', txt:'#991B1B' },
  '衛生':    { bg:'#F5F3FF', txt:'#5B21B6' },
  '道路':    { bg:'#E8EAF6', txt:'#303F9F' },
  '消防':    { bg:'#FFF3E0', txt:'#E53935' },
  '水電':    { bg:'#FFF8E1', txt:'#F57F17' },
  '其他':    { bg:'#F0EEEC', txt:'#7A6E66' },
};
var STATUS_COLOR = {
  '已處理':  { bg:'#EAF3EB', txt:'#2F6836' },
  '處理中':  { bg:'#FFF8E1', txt:'#B75D00' },
  '待確認':  { bg:'#EBF3FF', txt:'#1A56A8' },
  '已結案':  { bg:'#F0EEEC', txt:'#7A6E66' },
};
function statusBadge(status) {
  if (!status) return '';
  var c = STATUS_COLOR[status] || { bg:'#F0EEEC', txt:'#7A6E66' };
  return '<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;background:' + c.bg + ';color:' + c.txt + '">' + esc(status) + '</span>';
}
function cateBadge(cat) {
  var c = CATE_COLOR[cat] || { bg:'#F0EEEC', txt:'#7A6E66' };
  return '<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;background:' + c.bg + ';color:' + c.txt + '">' +
    '<svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/></svg>' +
    esc(cat) + '</span>';
}

// ──────────────────────────────────────────
// STATE
// ──────────────────────────────────────────
var allCases = [];
var currentCategoryFilter = 'all';

// ──────────────────────────────────────────
// LOAD DATA
// ──────────────────────────────────────────
function loadAll() {
  apiCall('getPublicCases')
    .then(function(json){
      if (!json.success) { showError(json.error || '無法取得資料'); return; }
      allCases = json.cases || [];
      buildCategoryChips();
      applyFilters();
      document.getElementById('headerSubtitle').textContent =
        CONFIG.VILLAGE_NAME + '・' + CONFIG.SYSTEM_NAME;
    })
    .catch(function(){
      showError('資料載入失敗，請稍後再試');
    });
}

// ──────────────────────────────────────────
// DROPDOWN
// ──────────────────────────────────────────
function toggleDropdown(id) {
  var panel = document.getElementById(id).querySelector('.dropdown-panel');
  var btn   = document.getElementById(id).querySelector('.dropdown-btn');
  var wasOpen = panel.classList.contains('open');
  closeAllDropdowns();
  if (!wasOpen) { panel.classList.add('open'); btn.classList.add('open'); }
}
function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-panel').forEach(function(p){ p.classList.remove('open'); });
  document.querySelectorAll('.dropdown-btn').forEach(function(b){ b.classList.remove('open'); });
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.dropdown')) closeAllDropdowns();
});

function selectCategory(el) {
  currentCategoryFilter = el.dataset.value;
  document.querySelectorAll('#categoryList .dropdown-item').forEach(function(i){ i.classList.remove('selected'); });
  el.classList.add('selected');
  document.getElementById('categoryLabel').textContent = currentCategoryFilter === 'all' ? '全部類別' : el.textContent.trim();
  document.getElementById('categoryBtn').classList.toggle('active', currentCategoryFilter !== 'all');
  closeAllDropdowns();
  applyFilters();
}

function buildCategoryChips() {
  var cats = {};
  allCases.forEach(function(d){ if (d.publicCate) cats[d.publicCate] = true; });
  var keys = Object.keys(cats).sort();
  var list = document.getElementById('categoryList');
  var html = '<div class="dropdown-item selected" data-value="all" onclick="selectCategory(this)">全部類別</div>';
  keys.forEach(function(c){
    html += '<div class="dropdown-item" data-value="' + esc(c) + '" onclick="selectCategory(this)">' + esc(c) + '</div>';
  });
  list.innerHTML = html;
}

// ──────────────────────────────────────────
// FILTER & RENDER
// ──────────────────────────────────────────
function applyFilters() {
  var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  var filtered = allCases.filter(function(d){
    if (currentCategoryFilter !== 'all' && (d.publicCate || '') !== currentCategoryFilter) return false;
    if (q) {
      var hay = [d.publicTitle, d.publicCate, d.publicLoc, d.publicSummary].join(' ').toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  renderGrid(filtered);
  document.getElementById('resultBar').innerHTML = '共 <strong>' + filtered.length + '</strong> 則公告' +
    (allCases.length !== filtered.length ? '・全部 ' + allCases.length + ' 則' : '');
}

function renderGrid(cases) {
  var grid = document.getElementById('cardGrid');
  if (!cases.length) {
    grid.innerHTML = '<div class="state-wrap">' +
      '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">' +
      '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
      '<h3>沒有符合的公告</h3><p>請嘗試調整搜尋條件</p></div>';
    return;
  }
  grid.innerHTML = cases.map(renderCard).join('');
}

function imgFallback(img) {
  var wrap = img.parentNode;
  wrap.innerHTML = '<div class="card-thumb-placeholder">' +
    '<svg width="28" height="28" fill="none" stroke="#B8A898" stroke-width="1.5" viewBox="0 0 24 24">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<polyline points="21 15 16 10 5 21"/></svg></div>';
}

function renderCard(d) {
  var thumb = d.repPhoto1
    ? '<div class="card-thumb"><img src="' + esc(d.repPhoto1) + '" alt="" loading="lazy" onerror="imgFallback(this)"></div>'
    : '<div class="card-thumb"><div class="card-thumb-placeholder">' +
      '<svg width="28" height="28" fill="none" stroke="#B8A898" stroke-width="1.5" viewBox="0 0 24 24">' +
      '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
      '<polyline points="21 15 16 10 5 21"/></svg></div></div>';

  var dateStr = '';
  if (d.replyTime) {
    var dd = new Date(d.replyTime);
    dateStr = isNaN(dd.getTime()) ? String(d.replyTime).slice(0,10) :
      dd.getFullYear() + '/' + (dd.getMonth()+1) + '/' + dd.getDate();
  }

  var html = '<div class="case-card" onclick="openCase(\'' + esc(d.caseId) + '\')">';
  html += thumb;
  html += '<div class="card-body">';
  html += '<div class="card-top">';
  if (d.status) html += statusBadge(d.status);
  if (d.publicCate) html += cateBadge(d.publicCate);
  html += '</div>';
  html += '<div class="card-title">' + esc(d.publicTitle || '（無標題）') + '</div>';
  if (d.publicSummary) {
    html += '<div class="card-desc">' + esc(d.publicSummary) + '</div>';
  }
  html += '<div class="card-footer">';
  if (dateStr) {
    html += '<span><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:-1px;margin-right:3px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + dateStr + '</span>';
  }
  if (d.publicLoc) {
    html += '<span style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' +
      '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:inline;vertical-align:-1px;margin-right:3px"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
      esc(d.publicLoc.length > 16 ? d.publicLoc.slice(0,16)+'…' : d.publicLoc) + '</span>';
  }
  html += '</div>';
  html += '</div></div>';
  return html;
}

function openCase(id) {
  window.location.href = 'opendetail.html?id=' + encodeURIComponent(id);
}

function showError(msg) {
  document.getElementById('cardGrid').innerHTML =
    '<div class="state-wrap">' +
    '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
    '<h3>載入失敗</h3><p>' + esc(msg) + '</p></div>';
  document.getElementById('resultBar').textContent = '載入失敗';
}

// ──────────────────────────────────────────
// INIT
// ──────────────────────────────────────────
loadAll();
setInterval(function(){ loadAll(); }, 60000);
</script>
</body>
</html>
