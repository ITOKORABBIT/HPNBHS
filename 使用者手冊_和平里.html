<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和平里小幫手 使用者手冊</title>
<style>
  :root{
    --bg:#f3f0ea;
    --card:#ffffff;
    --line:#e1d7cb;
    --text:#2b231b;
    --muted:#8f7c69;
    --heading:#17110c;
    --green:#4d7a56;
    --green-soft:#ebf3ec;
    --gold:#be9445;
    --gold-soft:#fbf4e4;
    --blue:#2f63ce;
    --blue-soft:#eef4ff;
    --shadow:0 18px 42px rgba(43,35,27,.08);
    --radius:24px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:
      radial-gradient(circle at top left, rgba(190,148,69,.12), transparent 28%),
      radial-gradient(circle at bottom right, rgba(77,122,86,.14), transparent 26%),
      var(--bg);
    color:var(--text);
    line-height:1.8;
  }
  a{color:inherit;text-decoration:none}
  .page{
    width:min(1360px,calc(100% - 24px));
    margin:18px auto 40px;
  }
  .topbar,.hero,.panel,.step-card,.tip-card,.visual{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .topbar{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:12px;
    padding:14px 18px;
    margin-bottom:18px;
  }
  .back-link,.title-chip,.page-link,.preview-action{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:12px 16px;
    border-radius:16px;
    border:1px solid var(--line);
    background:#fff;
    font-size:17px;
    font-weight:800;
  }
  .back-link{background:var(--green-soft);color:var(--green)}
  .title-chip{background:#fcfbf9}
  .topbar-spacer{flex:1}
  .hero{
    padding:34px 34px 28px;
    margin-bottom:18px;
    background:
      radial-gradient(circle at top right, rgba(190,148,69,.12), transparent 30%),
      radial-gradient(circle at bottom left, rgba(77,122,86,.10), transparent 26%),
      var(--card);
  }
  .hero-badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    border-radius:999px;
    background:var(--gold-soft);
    color:#8b651d;
    font-size:15px;
    font-weight:900;
    margin-bottom:16px;
  }
  h1{
    margin:0 0 14px;
    font-size:42px;
    line-height:1.3;
    color:var(--heading);
  }
  .hero p{
    margin:0;
    max-width:980px;
    font-size:22px;
    color:var(--muted);
  }
  .hero-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:14px;
    margin-top:24px;
  }
  .hero-note{
    padding:18px;
    border-radius:20px;
    border:1px solid var(--line);
    background:#fcfbf8;
  }
  .hero-note strong{
    display:block;
    margin-bottom:6px;
    font-size:18px;
  }
  .hero-note span{
    font-size:16px;
    color:var(--muted);
  }
  .layout{
    display:grid;
    grid-template-columns:310px 1fr;
    gap:18px;
    align-items:start;
  }
  .panel{padding:20px}
  .panel h2{
    margin:0 0 14px;
    font-size:24px;
  }
  .role-switch{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:18px;
  }
  .role-btn,.tab-btn{
    border:none;
    cursor:pointer;
    font:inherit;
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
  }
  .role-btn{
    padding:18px 16px;
    border-radius:20px;
    background:#f7f3ee;
    color:var(--muted);
    font-size:20px;
    font-weight:900;
    border:1px solid var(--line);
  }
  .role-btn.active{
    background:var(--green-soft);
    color:var(--green);
    box-shadow:inset 0 0 0 2px rgba(77,122,86,.10);
  }
  .tab-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .tab-btn{
    width:100%;
    text-align:left;
    padding:18px 18px;
    border-radius:20px;
    background:#fff;
    border:1px solid var(--line);
    font-size:20px;
    font-weight:900;
    color:var(--text);
  }
  .tab-btn small{
    display:block;
    margin-top:5px;
    color:var(--muted);
    font-size:14px;
    font-weight:700;
  }
  .tab-btn.active{
    background:var(--blue-soft);
    color:var(--blue);
    box-shadow:inset 0 0 0 2px rgba(47,99,206,.10);
  }
  .content{
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .content-head{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:flex-start;
    justify-content:space-between;
  }
  .title-wrap h2{
    margin:0 0 8px;
    font-size:34px;
  }
  .title-wrap p{
    margin:0;
    font-size:20px;
    color:var(--muted);
  }
  .summary-badge{
    padding:12px 16px;
    border-radius:16px;
    background:var(--green-soft);
    color:var(--green);
    font-size:18px;
    font-weight:900;
  }
  .page-links{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:14px;
  }
  .page-link{
    background:#fcfbf9;
    font-size:16px;
  }
  .visual{
    padding:18px;
    overflow:hidden;
  }
  .preview-meta{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .preview-label{
    font-size:18px;
    font-weight:900;
    color:var(--heading);
  }
  .preview-shell{
    position:relative;
    width:100%;
    min-height:560px;
    border-radius:22px;
    overflow:hidden;
    border:1px solid #d8cdc0;
    background:#fff;
  }
  .preview-frame{
    width:100%;
    height:560px;
    border:0;
    background:#fff;
  }
  .preview-pin{
    position:absolute;
    width:42px;
    height:42px;
    display:grid;
    place-items:center;
    border-radius:50%;
    background:var(--blue);
    color:#fff;
    font-size:22px;
    font-weight:900;
    box-shadow:0 10px 18px rgba(47,99,206,.28);
    border:3px solid rgba(255,255,255,.94);
    z-index:2;
    transform:translate(-50%,-50%);
  }
  .pin-legend{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:12px;
    margin-top:14px;
  }
  .pin-item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:14px;
    border-radius:18px;
    border:1px solid var(--line);
    background:#fcfbf9;
  }
  .pin-no{
    width:36px;
    height:36px;
    flex:0 0 36px;
    display:grid;
    place-items:center;
    border-radius:50%;
    background:var(--blue-soft);
    color:var(--blue);
    font-size:18px;
    font-weight:900;
  }
  .pin-text strong{
    display:block;
    font-size:17px;
    line-height:1.4;
    color:var(--heading);
  }
  .pin-text span{
    display:block;
    margin-top:4px;
    font-size:15px;
    line-height:1.6;
    color:var(--muted);
  }
  .visual-caption{
    margin-top:14px;
    font-size:18px;
    color:var(--muted);
    font-weight:700;
  }
  .steps{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:16px;
  }
  .step-card{
    padding:20px;
  }
  .step-no{
    width:52px;
    height:52px;
    display:grid;
    place-items:center;
    border-radius:18px;
    background:var(--blue-soft);
    color:var(--blue);
    font-size:24px;
    font-weight:900;
    margin-bottom:12px;
  }
  .step-card h3{
    margin:0 0 10px;
    font-size:24px;
    line-height:1.4;
  }
  .step-card p{
    margin:0;
    font-size:20px;
    color:var(--muted);
  }
  .tips{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:16px;
  }
  .tip-card{
    padding:20px;
  }
  .tip-card h3{
    margin:0 0 10px;
    font-size:22px;
  }
  .tip-card ul{
    margin:0;
    padding-left:22px;
  }
  .tip-card li{
    font-size:18px;
    margin-bottom:8px;
    color:var(--muted);
  }
  .notice{
    padding:18px 20px;
    border-radius:20px;
    background:#f9f7f3;
    border:1px dashed var(--line);
    font-size:19px;
    color:var(--muted);
    font-weight:700;
  }
  @media (max-width:1100px){
    .layout{grid-template-columns:1fr}
  }
  @media (max-width:900px){
    h1{font-size:34px}
    .hero p,.title-wrap p,.step-card p,.notice,.tip-card li{font-size:18px}
    .hero-grid,.steps,.tips,.pin-legend{grid-template-columns:1fr}
  }
  @media (max-width:680px){
    .page{width:min(100%,calc(100% - 16px))}
    .topbar,.hero,.panel,.step-card,.tip-card,.visual{border-radius:20px}
    .topbar,.hero,.panel{padding:16px}
    .role-btn,.tab-btn{font-size:18px}
    h1{font-size:30px}
    .title-wrap h2{font-size:28px}
    .preview-shell{min-height:420px}
    .preview-frame{height:420px}
    .preview-pin{width:38px;height:38px;font-size:20px}
  }
</style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="back-link" href="admin.html">回管理後台</a>
      <div class="topbar-spacer"></div>
      <div class="title-chip">和平里小幫手使用者手冊</div>
    </div>

    <section class="hero">
      <div class="hero-badge">大字版圖文教學</div>
      <h1>和平里小幫手使用者手冊</h1>
      <p>這份手冊改成「實際頁面預覽 + 藍色編號定位 + 下面步驟對照」的方式整理。請先選擇里長端或里民端，再切換想看的功能頁面，畫面上的 1、2、3、4 會直接對照下面的解說。</p>
      <div class="hero-grid">
        <div class="hero-note">
          <strong>先選角色</strong>
          <span>里長端看管理操作，里民端看查詢與送出表單。</span>
        </div>
        <div class="hero-note">
          <strong>再選頁面</strong>
          <span>案件、商店、公告、管理後台分別教學。</span>
        </div>
        <div class="hero-note">
          <strong>上下對照看</strong>
          <span>藍色 1、2、3、4 對照下面的 1、2、3、4 步驟卡。</span>
        </div>
      </div>
    </section>

    <section class="layout">
      <aside class="panel">
        <h2>1. 先選角色</h2>
        <div class="role-switch">
          <button class="role-btn active" data-role="mayor">里長端</button>
          <button class="role-btn" data-role="resident">里民端</button>
        </div>
        <h2>2. 再選頁面</h2>
        <div class="tab-list">
          <button class="tab-btn active" data-tab="cases">里民案件清單<small>案件管理頁與公開案件頁</small></button>
          <button class="tab-btn" data-tab="stores">特約商店清單<small>商店審核頁與公開商店頁</small></button>
          <button class="tab-btn" data-tab="bulletins">活動公告欄<small>公告管理頁與公告前台頁</small></button>
          <button class="tab-btn" data-tab="admins">管理後台補充<small>admin.html 補充說明</small></button>
        </div>
      </aside>

      <section class="content">
        <div class="panel">
          <div class="content-head">
            <div class="title-wrap">
              <h2 id="guideTitle"></h2>
              <p id="guideDesc"></p>
              <div class="page-links" id="pageLinks"></div>
            </div>
            <div class="summary-badge" id="roleBadge"></div>
          </div>
        </div>

        <div class="visual" id="visualWrap"></div>
        <div class="steps" id="stepsWrap"></div>
        <div class="tips" id="tipsWrap"></div>
        <div class="notice" id="noticeWrap"></div>
      </section>
    </section>
  </main>

let currentRole = 'mayor';
let currentTab = 'cases';

function renderPreview(tab, role){
  const preview = PREVIEW_MAP[`${tab}-${role}`];
  return `
    <div class="preview-meta">
      <div class="preview-label">實際頁面預覽：${preview.title}</div>
      <a class="preview-action" href="${preview.title}" target="_blank" rel="noopener">另開完整頁面</a>
    </div>
    <div class="preview-shell">
      <iframe class="preview-frame" src="${preview.title}" title="${preview.title} 預覽" loading="lazy"></iframe>
      ${preview.pins.map(pin => `<div class="preview-pin" style="left:${pin.x};top:${pin.y};">${pin.n}</div>`).join('')}
    </div>
    <div class="pin-legend">
      ${preview.pins.map(pin => `
        <div class="pin-item">
          <div class="pin-no">${pin.n}</div>
          <div class="pin-text">
            <strong>${pin.title}</strong>
            <span>${pin.desc}</span>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="visual-caption">上方藍色 1、2、3、4 會直接對照下面步驟卡的 1、2、3、4，請上下對照一起看。</div>
    <div class="notice" style="margin-top:14px">${preview.note}</div>
  `;
}

function renderGuide(){
  const data = GUIDE_DATA[currentTab];
  document.getElementById('guideTitle').textContent = data.title;
  document.getElementById('guideDesc').textContent = data.desc[currentRole];
  document.getElementById('roleBadge').textContent = currentRole === 'mayor' ? '目前顯示：里長端教學' : '目前顯示：里民端教學';
  document.getElementById('pageLinks').innerHTML = data.pages[currentRole].map(item => `
    <a class="page-link" href="${item.href}" target="_blank" rel="noopener">${item.label}：${item.text}</a>
  `).join('');
  document.getElementById('visualWrap').innerHTML = renderPreview(currentTab, currentRole);
  document.getElementById('stepsWrap').innerHTML = data.steps[currentRole].map((item, index) => `
    <article class="step-card">
      <div class="step-no">${index + 1}</div>
      <h3>${item[0]}</h3>
      <p>${item[1]}</p>
    </article>
  `).join('');

  const tipData = data.tips[currentRole];
  const otherRole = currentRole === 'mayor' ? 'resident' : 'mayor';
  document.getElementById('tipsWrap').innerHTML = `
    <article class="tip-card">
      <h3>${tipData.title}</h3>
      <ul>${tipData.items.map(item => `<li>${item}</li>`).join('')}</ul>
    </article>
    <article class="tip-card">
      <h3>切換另一邊也很重要</h3>
      <ul>
        <li>同一個頁面也有 ${otherRole === 'mayor' ? '里長端' : '里民端'} 的說明。</li>
        <li>如果您要教別人操作，建議兩邊都看一次。</li>
        <li>這次的畫面不是假示意，而是直接讀取實際頁面。</li>
      </ul>
    </article>
  `;

  document.getElementById('noticeWrap').textContent = data.notice[currentRole];
}

document.querySelectorAll('.role-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentRole = btn.dataset.role;
    document.querySelectorAll('.role-btn').forEach(item => item.classList.toggle('active', item === btn));
    renderGuide();
  });
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(item => item.classList.toggle('active', item === btn));
    renderGuide();
  });
});

renderGuide();
</script>
